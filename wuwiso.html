<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WU Aufnahmeprüfung Wirtschaft — Testsimulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   WU Wien – Aufnahmeprüfung Wirtschaft – Prüfungssimulation
   Design: Amtliches Prüfungsformular / Korrektur-Stempel
   ============================================================ */

:root{
  /* --- surfaces --- */
  --bg:        #11152400;
  --bg-deep:   #10142a;
  --bg-soft:   #1b2247;
  --bg-grid:   #232c58;
  --paper:     #eeefe8;
  --paper-2:   #f7f7f2;
  --paper-line:#cdd0c4;
  --paper-shadow: rgba(10, 13, 30, .35);

  /* --- ink / text --- */
  --ink:       #1b2236;
  --ink-soft:  #545b70;
  --ink-faint: #8990a6;
  --on-dark:   #eef0fb;
  --on-dark-soft: #aab1d6;

  /* --- accents --- */
  --navy:      #2b3a67;
  --navy-deep: #1d2a52;
  --navy-light:#4f63a1;
  --amber:     #c9962f;
  --green:     #2f6f4f;
  --green-bg:  #e4efe8;
  --red:       #a8392b;
  --red-bg:    #f3e4e1;

  /* --- type --- */
  --f-display: "Space Grotesk", "Arial Narrow", sans-serif;
  --f-body:    "Inter", system-ui, sans-serif;
  --f-mono:    "IBM Plex Mono", "Courier New", monospace;

  --radius: 3px;
}

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 18% 12%, var(--bg-grid) 0%, transparent 45%),
    radial-gradient(circle at 84% 78%, var(--bg-grid) 0%, transparent 50%),
    var(--bg-deep);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.hidden{ display:none !important; }

a{ color: inherit; }

button{ font-family: inherit; cursor:pointer; }
button:focus-visible,
input:focus-visible,
[tabindex]:focus-visible{
  outline: 3px solid var(--amber);
  outline-offset: 2px;
}

/* ============================================================
   App shell
   ============================================================ */
#app{
  max-width: 920px;
  margin: 0 auto;
  padding: clamp(14px, 4vw, 40px) clamp(12px, 4vw, 28px) 60px;
}

.masthead{
  display:flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  color: var(--on-dark);
  padding: 6px 4px 18px;
  border-bottom: 1px solid rgba(238,240,251,.18);
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.masthead .brand{
  font-family: var(--f-display);
  font-weight: 600;
  font-size: 1.05rem;
  letter-spacing: .01em;
}
.masthead .brand small{
  display:block;
  font-family: var(--f-mono);
  font-size: .68rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--on-dark-soft);
  margin-top: 3px;
}
.masthead .file-no{
  font-family: var(--f-mono);
  font-size: .72rem;
  color: var(--on-dark-soft);
  letter-spacing: .04em;
  text-align: right;
}

/* ============================================================
   "Paper" card – the exam-form surface
   ============================================================ */
.sheet{
  position: relative;
  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0, transparent 27px,
      var(--paper-line) 27px, var(--paper-line) 28px
    ),
    var(--paper);
  border: 1px solid #d9dbcf;
  border-radius: var(--radius);
  box-shadow: 0 18px 50px -12px var(--paper-shadow), 0 2px 0 rgba(255,255,255,.4) inset;
  padding: clamp(18px, 4vw, 38px);
}
.sheet--plain{
  background: var(--paper);
}

.tab-corner{
  position:absolute;
  top:-10px; right: 22px;
  background: var(--navy);
  color: var(--on-dark);
  font-family: var(--f-mono);
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 5px 10px 4px;
  border-radius: 2px 2px 0 0;
}

/* ============================================================
   Start screen
   ============================================================ */
.cover-title{
  font-family: var(--f-display);
  font-size: clamp(1.5rem, 4vw, 2.15rem);
  font-weight: 600;
  margin: 4px 0 6px;
  line-height: 1.18;
}
.cover-sub{
  color: var(--ink-soft);
  font-size: .98rem;
  max-width: 56ch;
  margin: 0 0 22px;
}

.cover-fields{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 0;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 26px;
  background: var(--paper-2);
}
.cover-fields div{
  padding: 10px 14px;
  border-right: 1px solid var(--paper-line);
  border-bottom: 1px solid var(--paper-line);
}
.cover-fields div:last-child{ border-right:none; }
.cover-fields .k{
  display:block;
  font-family: var(--f-mono);
  font-size: .62rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 3px;
}
.cover-fields .v{
  font-family: var(--f-mono);
  font-size: .85rem;
  color: var(--ink);
}

.option-block{ margin-bottom: 24px; }
.option-block > .label{
  font-family: var(--f-mono);
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--ink-faint);
  margin-bottom: 10px;
  display:block;
}
.choice-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
  gap: 10px;
}
.choice-card{
  border: 1.5px solid var(--paper-line);
  background: var(--paper-2);
  border-radius: var(--radius);
  padding: 12px 14px;
  text-align: left;
  transition: border-color .15s, background .15s, transform .1s;
}
.choice-card:hover{ border-color: var(--navy-light); }
.choice-card.active{
  border-color: var(--navy);
  background: #e3e7f3;
}
.choice-card .t{
  font-family: var(--f-display);
  font-weight: 600;
  font-size: .95rem;
  margin-bottom: 2px;
}
.choice-card .d{
  font-size: .78rem;
  color: var(--ink-soft);
}

.btn{
  font-family: var(--f-display);
  font-weight: 600;
  font-size: .92rem;
  border-radius: var(--radius);
  border: 1.5px solid var(--navy);
  background: var(--navy);
  color: #fff;
  padding: 13px 26px;
  letter-spacing: .01em;
  transition: background .15s, transform .08s, box-shadow .15s;
}
.btn:hover{ background: var(--navy-deep); }
.btn:active{ transform: translateY(1px); }
.btn[disabled]{ opacity:.45; cursor:not-allowed; }
.btn--ghost{
  background: transparent;
  color: var(--navy);
}
.btn--ghost:hover{ background: rgba(43,58,103,.08); }
.btn--full{ width:100%; text-align:center; display:block; }

.start-actions{
  display:flex;
  justify-content: flex-end;
  align-items:center;
  gap: 14px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.start-note{
  font-size: .78rem;
  color: var(--ink-faint);
  margin-right: auto;
}

/* ============================================================
   Quiz screen
   ============================================================ */
.quiz-header{
  display:flex;
  align-items:center;
  gap: 18px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.progress-wrap{ flex: 1 1 220px; }
.progress-meta{
  display:flex;
  justify-content: space-between;
  font-family: var(--f-mono);
  font-size: .72rem;
  color: var(--on-dark-soft);
  margin-bottom: 6px;
  letter-spacing: .03em;
}
.progress-track{
  height: 8px;
  background: rgba(238,240,251,.14);
  border-radius: 5px;
  overflow:hidden;
  position:relative;
}
.progress-fill{
  height:100%;
  background: linear-gradient(90deg, var(--navy-light), var(--amber));
  border-radius: 5px;
  transition: width .25s ease;
}
.timer-pill{
  font-family: var(--f-mono);
  font-size: .8rem;
  color: var(--on-dark);
  background: rgba(238,240,251,.1);
  border: 1px solid rgba(238,240,251,.25);
  border-radius: 20px;
  padding: 6px 14px;
  white-space: nowrap;
}
.timer-pill.low{ border-color: var(--red); color:#ffd9d2; background: rgba(168,57,43,.25); }

.tagrow{
  display:flex;
  gap:8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items:center;
}
.tag{
  font-family: var(--f-mono);
  font-size: .65rem;
  letter-spacing: .07em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 3px;
  border: 1px solid var(--paper-line);
  color: var(--ink-soft);
  background: var(--paper-2);
}
.tag.diff-leicht{ border-color:#b9c6e0; color:#33437a; }
.tag.diff-mittel{ border-color:#9aa9d6; color:#2b3a67; background:#e3e7f3;}
.tag.diff-schwer{ border-color:#7c8cc4; color:#fff; background:#2b3a67;}
.tag.type-case{ border-color: var(--amber); color:#8a6510; background:#f7ecd4; }
.tag.type-calc{ border-color:#8da08c; color:#2f6f4f; background:#e4efe8; }

.scenario-box{
  border-left: 4px solid var(--amber);
  background: #f7f2e3;
  padding: 14px 16px;
  margin-bottom: 18px;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: .94rem;
  color: var(--ink);
}
.scenario-box .sc-label{
  font-family: var(--f-mono);
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #8a6510;
  display:block;
  margin-bottom: 6px;
}
.scenario-box p{ margin: 0 0 6px; }
.scenario-box p:last-child{ margin-bottom:0; }

/* in-question balance sheet */
.qbilanz{
  border: 1px solid var(--ink);
  border-radius: var(--radius);
  overflow:hidden;
  margin: 4px 0 18px;
  font-size: .82rem;
}
.qbilanz-head{
  display:grid;
  grid-template-columns: 1fr auto 1fr auto;
  background: var(--navy);
  color: var(--on-dark);
  font-family: var(--f-display);
  font-weight:600;
  font-size: .76rem;
}
.qbilanz-head > div{ padding: 8px 12px; }
.qbilanz-head .amt{ text-align:right; }
.qbilanz-body{
  display:grid;
  grid-template-columns: 1fr auto 1fr auto;
}
.qbilanz-body > div{
  padding: 7px 12px;
  border-top: 1px solid var(--paper-line);
  background: var(--paper-2);
}
.qbilanz-body .amt{ text-align:right; font-family: var(--f-mono); }
.qbilanz-body .grp{ font-weight:700; background: var(--paper); }
.qbilanz-foot{
  display:grid;
  grid-template-columns: 1fr auto 1fr auto;
  border-top: 2px solid var(--ink);
  background: var(--paper);
  font-weight:700;
  font-family: var(--f-display);
}
.qbilanz-foot > div{ padding: 9px 12px; }
.qbilanz-foot .amt{ text-align:right; font-family: var(--f-mono); }
.qbilanz .col-sep{ border-left: 1px solid var(--ink); }

@media (max-width: 620px){
  .qbilanz{ font-size: .74rem; }
  .qbilanz-head > div, .qbilanz-body > div, .qbilanz-foot > div{ padding: 6px 7px; }
}

.q-block{
  padding: 18px 0;
  border-top: 1px solid var(--paper-line);
}
.q-block:first-of-type{ border-top:none; padding-top:0; }
.q-number{
  font-family: var(--f-mono);
  font-size: .68rem;
  color: var(--ink-faint);
  letter-spacing: .06em;
  margin-bottom: 6px;
}
.q-text{
  font-family: var(--f-display);
  font-size: clamp(1.05rem, 2.4vw, 1.28rem);
  font-weight: 600;
  line-height: 1.35;
  margin: 0 0 16px;
}
.q-hint{
  font-size: .8rem;
  color: var(--ink-faint);
  margin: -10px 0 14px;
}

/* --- Multiple-True-False statement rows --- */
.stmt-list{
  display:flex; flex-direction:column;
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  overflow:hidden;
}
.stmt{
  display:grid;
  grid-template-columns: 38px 1fr 60px;
  align-items:stretch;
  border-top: 1px solid var(--paper-line);
  background: var(--paper-2);
  text-align:left;
  width:100%;
  font-size: .95rem;
  color: var(--ink);
  transition: background .12s;
  padding: 0;
}
.stmt:first-child{ border-top:none; }
.stmt:hover:not([disabled]){ background:#e9ebe2; }
.stmt .letter{
  display:flex; align-items:center; justify-content:center;
  font-family: var(--f-mono);
  font-size: .8rem;
  color: var(--ink-faint);
  background: rgba(0,0,0,.03);
  border-right: 1px solid var(--paper-line);
}
.stmt .body{
  padding: 13px 14px;
  line-height:1.45;
}
.stmt .check{
  display:flex; align-items:center; justify-content:center;
  border-left: 1px solid var(--paper-line);
}
.stmt .box{
  width:22px; height:22px;
  border-radius: 5px;
  border: 1.5px solid var(--ink-faint);
  display:flex; align-items:center; justify-content:center;
  font-size: .82rem; line-height:1;
  color:#fff;
  background: var(--paper-2);
  transition: background .1s, border-color .1s;
}
.stmt.checked .box{ border-color: var(--navy); background: var(--navy); }
.stmt.checked .box::after{ content:"✓"; }

/* graded states (review) – mirror the WU exam colour key */
.stmt[disabled]{ cursor:default; }
.stmt.g-hit   { background: var(--green-bg); }      /* correctly ticked true */
.stmt.g-hit .check{ background: var(--green-bg); }
.stmt.g-miss  { background: var(--paper-2); }       /* true, left unticked */
.stmt.g-wrong { background: var(--red-bg); }        /* false, wrongly ticked */
.stmt.g-ok    { background: var(--green-bg); }       /* false, correctly left */
.stmt.g-hit .box, .stmt.g-wrong .box{ }
.stmt .pts{
  display:flex; align-items:center; justify-content:flex-end;
  padding: 0 12px;
  font-family: var(--f-mono);
  font-size: .72rem;
  color: var(--ink-faint);
  border-left: 1px solid var(--paper-line);
  white-space:nowrap;
}
.stmt.row-graded{ grid-template-columns: 38px 1fr 74px; }
.stmt .pts.pos{ color: var(--green); }
.stmt .pts.neg{ color: var(--red); }

.stmt-expl{
  grid-column: 1 / -1;
  border-top: 1px dashed var(--paper-line);
  padding: 10px 14px 12px 52px;
  font-size: .84rem;
  color: var(--ink-soft);
  background: rgba(255,255,255,.4);
}
.stmt-expl .v{ color: var(--green); font-weight:600; }
.stmt-expl .x{ color: var(--red); font-weight:600; }

.points-banner{
  font-family: var(--f-mono);
  font-size: .72rem;
  letter-spacing:.04em;
  color: var(--on-dark-soft);
  text-align:right;
  margin-top: 8px;
}

.q-scoreline{
  display:flex; justify-content:space-between; align-items:center;
  margin-top: 14px;
  padding: 11px 14px;
  border-radius: var(--radius);
  background: var(--paper);
  border: 1px solid var(--paper-line);
  font-family: var(--f-mono);
  font-size: .82rem;
}
.q-scoreline .lbl{ color: var(--ink-soft); }
.q-scoreline .val{ font-weight:700; }
.q-scoreline .val.full{ color: var(--green); }
.q-scoreline .val.part{ color: var(--amber); }
.q-scoreline .val.zero{ color: var(--red); }

/* stamp – signature grading mark */
.stamp{
  position: absolute;
  top: -16px;
  right: 10px;
  font-family: var(--f-mono);
  font-weight: 700;
  font-size: .82rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 2.5px solid currentColor;
  border-radius: 4px;
  transform: rotate(-6deg);
  background: rgba(255,255,255,.55);
}
.stamp.ok{ color: var(--green); }
.stamp.bad{ color: var(--red); }

.quiz-footer{
  display:flex;
  justify-content: space-between;
  align-items:center;
  margin-top: 22px;
  gap: 12px;
  flex-wrap: wrap;
}
.quiz-footer .spacer{ flex:1; }

/* ============================================================
   Results screen
   ============================================================ */
.score-hero{
  display:flex;
  align-items:center;
  gap: 26px;
  flex-wrap:wrap;
  margin-bottom: 26px;
}
.score-circle{
  width: 130px; height:130px;
  border-radius:50%;
  border: 8px solid var(--navy);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: var(--paper-2);
  flex-shrink:0;
}
.score-circle .num{
  font-family: var(--f-display);
  font-size: 2rem;
  font-weight: 700;
  color: var(--navy);
  line-height:1;
}
.score-circle .pct{ font-family: var(--f-mono); font-size:.7rem; color:var(--ink-faint); }
.score-headline h2{
  font-family: var(--f-display);
  margin: 0 0 6px;
  font-size: 1.4rem;
}
.score-headline p{ margin:0; color: var(--ink-soft); max-width: 48ch; }

.balance-title{
  font-family: var(--f-mono);
  font-size: .72rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-align:center;
  margin: 10px 0 4px;
}
.balance-sheet{
  display:grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--ink);
  border-radius: var(--radius);
  overflow:hidden;
  margin-bottom: 26px;
}
.balance-col{ background: var(--paper-2); }
.balance-col + .balance-col{ border-left: 1px solid var(--ink); }
.balance-head{
  font-family: var(--f-display);
  font-weight:700;
  font-size: .82rem;
  letter-spacing:.04em;
  padding: 10px 14px;
  border-bottom: 1px solid var(--ink);
  background: var(--paper);
}
.balance-head.aktiva{ color: var(--green); }
.balance-head.passiva{ color: var(--red); }
.balance-row{
  display:flex;
  justify-content:space-between;
  gap: 10px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--paper-line);
  font-size: .87rem;
}
.balance-row:last-child{ border-bottom:none; }
.balance-row .name{ color: var(--ink); }
.balance-row .pct{ font-family: var(--f-mono); color: var(--ink-soft); flex-shrink:0; }
.balance-empty{
  padding: 14px;
  font-size: .8rem;
  color: var(--ink-faint);
  font-style: italic;
}
.balance-foot{
  display:flex;
  justify-content:space-between;
  padding: 10px 14px;
  font-family: var(--f-mono);
  font-size: .78rem;
  border-top: 2px solid var(--ink);
  background: var(--paper);
  grid-column: 1 / -1;
}

.tips{
  background: var(--paper-2);
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 26px;
}
.tips h3{
  font-family: var(--f-display);
  font-size: .95rem;
  margin: 0 0 10px;
}
.tips ul{ margin:0; padding-left: 1.2em; }
.tips li{ margin-bottom: 6px; font-size: .9rem; }

.review-list{ display:flex; flex-direction:column; gap: 14px; }
.review-item{
  border: 1px solid var(--paper-line);
  border-radius: var(--radius);
  padding: 14px 16px;
  background: var(--paper-2);
}
.review-item .rh{
  display:flex;
  justify-content:space-between;
  gap: 10px;
  align-items:flex-start;
  margin-bottom: 8px;
}
.review-item .rq{ font-weight:600; font-size:.92rem; }
.review-item .ra{ font-size: .85rem; color: var(--ink-soft); margin: 3px 0; }
.review-item .re{ font-size: .83rem; color: var(--ink-soft); border-top:1px dashed var(--paper-line); padding-top:7px; margin-top:7px;}
.badge-result{
  font-family: var(--f-mono);
  font-size: .65rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding: 3px 9px;
  border-radius: 3px;
  flex-shrink:0;
}
.badge-result.ok{ background: var(--green-bg); color: var(--green); }
.badge-result.bad{ background: var(--red-bg); color: var(--red); }

details.review-toggle > summary{
  cursor:pointer;
  font-family: var(--f-display);
  font-weight:600;
  color: var(--navy);
  padding: 4px 0;
  list-style: none;
}
details.review-toggle > summary::-webkit-details-marker{ display:none; }
details.review-toggle > summary::before{
  content: "▸ ";
}
details.review-toggle[open] > summary::before{
  content: "▾ ";
}

footer.legal{
  text-align:center;
  color: var(--on-dark-soft);
  font-size: .72rem;
  margin-top: 36px;
  line-height:1.6;
}

@media (max-width: 560px){
  .balance-sheet{ grid-template-columns: 1fr; }
  .balance-col + .balance-col{ border-left:none; border-top:1px solid var(--ink); }

  stem:"Welche der folgenden Aussagen zur Innen- und Außenfinanzierung ist/sind korrekt?",
  statements:[
    { text:"Die Selbstfinanzierung durch einbehaltene Gewinne ist eine Form der Innenfinanzierung.", correct:true,
      explain:"Richtig. Stammt die Finanzierungsquelle aus dem Umsatz des Unternehmens, handelt es sich um Innenfinanzierung; die Selbstfinanzierung ist deren wichtigste Form." },
    { text:"Die Ausgabe neuer Aktien (Emission) ist eine Form der Innenfinanzierung.", correct:false,
      explain:"Falsch. Die Aktienemission führt dem Unternehmen Kapital von außen zu und ist daher Außenfinanzierung (mit Eigenkapital)." },
    { text:"Abschreibungen und das Bilden von Rückstellungen können einen Innenfinanzierungseffekt haben.", correct:true,
      explain:"Richtig. Beide mindern den Gewinn, stellen aber keine sofortige Auszahlung dar – die Mittel bleiben bis zur tatsächlichen Verwendung im Unternehmen." },
    { text:"Ein Lieferantenkredit (Lieferverbindlichkeit) ist eine Form der Außenfinanzierung mit Fremdkapital.", correct:true,
      explain:"Richtig. Wird 'auf Ziel' bezahlt, finanzieren die Lieferant:innen das Unternehmen kurzfristig von außen mit Fremdkapital." },
    { text:"Selbstfinanzierung macht ein Unternehmen tendenziell abhängiger von Fremdkapitalgebern.", correct:false,
      explain:"Falsch. Selbstfinanzierung macht ein Unternehmen gerade WENIGER abhängig von Fremdkapitalgebern und krisenresistenter." }
  ]
},

{ id:"f3", topic:"finanzierung", difficulty:"schwer",
  title:"Aktien und Anleihen",
  stem:"Welche der folgenden Aussagen zu Aktien und Anleihen ist/sind korrekt?",
  statements:[
    { text:"Eine Aktie verbrieft ein Anteilsrecht am Grundkapital einer Aktiengesellschaft.", correct:true,
      explain:"Richtig. Die Aktie ist ein Wertpapier, das einen Anteil am Grundkapital der AG verbrieft (Eigenkapital)." },
    { text:"Eine Anleihe verbrieft ein Forderungsrecht gegenüber dem Emittenten und stellt damit Fremdkapital dar.", correct:true,
      explain:"Richtig. Die Anleihe verbrieft eine Forderung gegenüber dem Emittenten (Staat oder Unternehmen) und ist Fremdkapital." },
    { text:"Beim Handel bereits ausgegebener Aktien zwischen Anleger:innen entsteht ein zusätzlicher Finanzierungseffekt für die AG.", correct:false,
      explain:"Falsch. Ein Finanzierungseffekt entsteht nur bei der Emission. Beim späteren Handel zwischen Anleger:innen profitiert die AG nicht; nur die Verkäufer:innen erzielen ggf. Kursgewinne." },
    { text:"Anleihen können fix oder variabel verzinst sein; variabel verzinste Anleihen werden auch 'Floater' genannt.", correct:true,
      explain:"Richtig. Bei variabler Verzinsung wird der Zinssatz an das allgemeine Zinsniveau (z. B. den Euribor) angepasst – solche Anleihen heißen 'Floater'." },
    { text:"Eine Rückzahlung des Aktienkapitals an die Aktionäre ist gesetzlich vorgeschrieben und erfolgt am Ende einer festen Laufzeit.", correct:false,
      explain:"Falsch. Eine Rückzahlung des Aktienkapitals ist nicht vorgesehen – Aktien stellen unbefristet zur Verfügung gestelltes Kapital dar und haben keine feste Laufzeit." }
  ]
},

{ id:"f4", topic:"finanzierung", difficulty:"schwer",
  title:"Cashflow einer Grazer GmbH kurzfristig erhöhen",
  scenario:"Die GrünGarten GmbH mit Sitz in Graz handelt mit Gartengeräten und möchte kurzfristig ihren Cashflow (Zahlungsmittelzufluss) erhöhen. Mit welchen Maßnahmen ist dies für diese Gesellschaft möglich?",
  stem:"Welche der folgenden Aussagen ist/sind korrekt?",
  statements:[
    { text:"Die GrünGarten GmbH nimmt eine weitere Gesellschafterin auf, die eine zusätzliche Kapitaleinlage in bar leistet.", correct:true,
      explain:"Richtig. Eine zusätzliche Bareinlage führt dem Unternehmen sofort liquide Mittel zu und erhöht den Cashflow." },
    { text:"Die GrünGarten GmbH gewährt ihren Kund:innen kein Zahlungsziel mehr; sie müssen sofort bezahlen.", correct:true,
      explain:"Richtig. Kürzere bzw. keine Zahlungsziele für Kund:innen beschleunigen den Zahlungsmittelzufluss und erhöhen kurzfristig den Cashflow." },
    { text:"Die GrünGarten GmbH kauft eine bisher um 1.200 EUR pro Monat gemietete Maschine sofort für 60.000 EUR in bar.", correct:false,
      explain:"Falsch. Ein sofortiger Barkauf ist ein MittelABfluss – er senkt den Cashflow kurzfristig, statt ihn zu erhöhen." },
    { text:"Die GrünGarten GmbH nimmt bei ihrer Hausbank einen kurzfristigen Kredit über 80.000 EUR auf.", correct:true,
      explain:"Richtig. Ein Bankkredit führt dem Unternehmen sofort liquide Mittel zu und erhöht damit den Cashflow." },
    { text:"Die GrünGarten GmbH emittiert Aktien und nimmt damit zusätzliche liquide Mittel ein.", correct:false,
      explain:"Falsch. Eine Aktienemission ist nur einer Aktiengesellschaft möglich. Die GrünGarten GmbH ist eine GmbH und kann keine Aktien ausgeben." }
  ]
},


/* ============================================================
   RECHNUNGSWESEN & BILANZ

{ id:"r1", topic:"rechnungswesen", difficulty:"schwer",
  title:"Bilanzanalyse einer Industrie-GmbH",
  scenario:"Nachstehend sehen Sie die Bilanz der Werrata GmbH, eines Industriebetriebs mit Sitz in Linz, per 31.12.20xx (alle Beträge in Euro). Das Anlagevermögen umfasst die Grundstücke, Bauten und technischen Anlagen sowie die langfristigen Finanzanlagen; das Umlaufvermögen umfasst die übrigen Aktiva.",
  bilanz: {
    aktiva: [
      { name:"Anlagevermögen", value:"", head:true },
      { name:"Grundstücke, Bauten und technische Anlagen", value:"3 120 000" },
      { name:"Finanzanlagen (langfristig)", value:"360 000" },
      { name:"Umlaufvermögen", value:"", head:true },
      { name:"Vorräte", value:"6 900 000" },
      { name:"Forderungen aus Lieferungen und Leistungen", value:"1 050 000" },
      { name:"Bankguthaben und Barbestand", value:"470 000" }
    ],
    passiva: [
      { name:"Eigenkapital", value:"", head:true },
      { name:"Bareinlagen der Gesellschafter", value:"900 000" },
      { name:"Gewinn", value:"2 300 000" },
      { name:"Fremdkapital", value:"", head:true },
      { name:"Rückstellungen", value:"1 600 000" },
      { name:"Bankkredit (Laufzeit 12 Jahre)", value:"6 400 000" },
      { name:"Verbindlichkeiten aus Lieferungen und Leistungen", value:"700 000" }
    ],
    summe: "11 900 000"
  },
  stem:"Welche der folgenden Aussagen zu dieser Bilanz ist/sind korrekt?",
  statements:[
    { text:"Die Werrata GmbH bezahlt alle ihre Rechnungen sofort und hat keine offenen Verbindlichkeiten.", correct:false,
      explain:"Falsch. Die Bilanz weist 700.000 Euro Verbindlichkeiten aus Lieferungen und Leistungen aus – das Unternehmen hat also sehr wohl offene Rechnungen." },
    { text:"Im Sinne der goldenen Bilanzregel ist das Anlagevermögen vollständig durch langfristiges Kapital (Eigenkapital und langfristiger Bankkredit) gedeckt.", correct:true,
      explain:"Richtig. Das Anlagevermögen beträgt 3.480.000 Euro; allein das Eigenkapital (3.200.000) plus der 12-jährige Bankkredit (6.400.000) deckt es mehr als ausreichend langfristig ab." },
    { text:"Wenn die Werrata GmbH Aktien kauft und damit ihre Finanzanlagen erhöht, steigt dadurch auch ihr Eigenkapital.", correct:false,
      explain:"Falsch. Der Kauf von Aktien ist ein reiner Aktivtausch: Die Finanzanlagen steigen, das Bankguthaben sinkt um denselben Betrag. Das Eigenkapital bleibt unverändert." },
    { text:"Unter den Aktiva der Werrata GmbH lässt sich keine Position rascher zu Zahlungsmitteln machen als der Posten 'Bankguthaben und Barbestand'.", correct:true,
      explain:"Richtig. Bankguthaben und Barbestand sind bereits Zahlungsmittel und damit die liquideste Position der Aktiva." },
    { text:"Auf den Posten 'Vorräte' entfällt mehr als die Hälfte der gesamten Bilanzsumme.", correct:true,
      explain:"Richtig. Die Vorräte betragen 6.900.000 Euro; das ist mehr als die Hälfte der Bilanzsumme von 11.900.000 Euro (Hälfte = 5.950.000)." }
  ]
},

{ id:"r2", topic:"rechnungswesen", difficulty:"schwer",
  title:"Aufbau und Logik der Bilanz",
  stem:"Welche der folgenden Aussagen zum Aufbau einer Bilanz ist/sind korrekt?",
  statements:[
    { text:"Die Summe der Aktiva entspricht stets der Summe der Passiva.", correct:true,
      explain:"Richtig. Jeder Vermögensteil muss finanziert worden sein – daher gilt immer: Summe der Aktiva = Summe der Passiva (Bilanzsumme)." },
    { text:"Die Aktivseite (Sollseite) zeigt, woher die Mittel des Unternehmens stammen.", correct:false,
      explain:"Falsch. Die Aktivseite zeigt die Mittelverwendung (wofür Mittel eingesetzt wurden, das Vermögen). Die Mittelherkunft steht auf der Passivseite (Habenseite)." },
    { text:"Das Eigenkapital ergibt sich als Differenz aus dem Vermögen und dem Fremdkapital.", correct:true,
      explain:"Richtig. Eigenkapital = Vermögen − Fremdkapital; es ist jener Teil des Vermögens, der nicht mit Schulden finanziert wurde." },
    { text:"Ein Vermögensgegenstand, der voraussichtlich länger als ein Jahr im Unternehmen bleibt, zählt zum Umlaufvermögen.", correct:false,
      explain:"Falsch. Vermögen, das länger als ein Jahr im Unternehmen bleibt, ist Anlagevermögen. Umlaufvermögen bleibt typischerweise kürzer als ein Jahr (z. B. Vorräte)." },
    { text:"Steigt das Eigenkapital eines Unternehmens im Vergleich zweier Bilanzstichtage, deutet das auf einen Gewinn hin.", correct:true,
      explain:"Richtig. Ein Steigen des Eigenkapitals bedeutet einen Gewinn, ein Sinken einen Verlust (doppelte Gewinnermittlung)." }
  ]
},

{ id:"r3", topic:"rechnungswesen", difficulty:"schwer",
  title:"Kostenrechnung, Deckungsbeitrag und Break-Even",
  scenario:"Ein Hersteller verkauft ein Fahrrad um 400 Euro; die variablen Kosten je Stück betragen 180 Euro. Die gesamten Fixkosten belaufen sich auf 4 Mio. Euro, die durchschnittliche Deckungsquote über alle Modelle liegt bei 55 %.",
  stem:"Welche der folgenden Aussagen ist/sind korrekt?",
  statements:[
    { text:"Der Deckungsbeitrag pro Fahrrad beträgt 220 Euro.", correct:true,
      explain:"Richtig. Deckungsbeitrag = Verkaufspreis − variable Kosten = 400 − 180 = 220 Euro." },
    { text:"Der Break-Even-Umsatz liegt bei rund 7,3 Mio. Euro.", correct:true,
      explain:"Richtig. Break-Even-Umsatz = Fixkosten ÷ Deckungsquote = 4 Mio. ÷ 0,55 ≈ 7,27 Mio. Euro." },
    { text:"Kurzfristig ist ein Verkauf unter den Vollkosten betriebswirtschaftlich nie sinnvoll.", correct:false,
      explain:"Falsch. Solange der Preis die variablen Kosten übersteigt, wird ein Deckungsbeitrag erzielt. Kurzfristig kann ein Verkauf über variablen, aber unter Vollkosten sinnvoller sein als gar nicht zu verkaufen." },
    { text:"Die Miete für die Produktionshalle zählt zu den variablen Kosten.", correct:false,
      explain:"Falsch. Die Hallenmiete fällt unabhängig von der produzierten Stückzahl an und ist daher eine Fixkost. Variabel sind z. B. die Materialkosten je Stück." },
    { text:"Die Kostenrechnung ist gesetzlich nicht verpflichtend und wird als internes Rechnungswesen bezeichnet.", correct:true,
      explain:"Richtig. Die Kostenrechnung dient internen Steuerungs- und Kontrollzwecken und ist nicht gesetzlich vorgeschrieben." }
  ]
},

{ id:"r4", topic:"rechnungswesen", difficulty:"mittel",
  title:"Gewinn, Cashflow und Buchhaltungspflicht",
  stem:"Welche der folgenden Aussagen zu Gewinnermittlung, Cashflow und Buchführung ist/sind korrekt?",
  statements:[
    { text:"In der Gewinn- und Verlustrechnung wird der Gewinn ermittelt, indem von den Erträgen die Aufwände abgezogen werden.", correct:true,
      explain:"Richtig. Übersteigt die Summe aus Erlösen und Erträgen die Aufwände, entsteht ein Gewinn." },
    { text:"Gewinn und Cashflow sind stets identisch.", correct:false,
      explain:"Falsch. Man kann einen Gewinn erzielen, ohne liquide zu sein, und liquide sein, ohne einen Gewinn zu erzielen. Gewinn und Cashflow sind unterschiedliche Kennzahlen." },
    { text:"Kapitalgesellschaften müssen unabhängig vom Umsatz eine doppelte Buchhaltung führen.", correct:true,
      explain:"Richtig. Kapitalgesellschaften sind immer zur doppelten Buchhaltung (Bilanz und G&V) verpflichtet." },
    { text:"Ein Einzelunternehmen mit 400.000 Euro Jahresumsatz darf eine Einnahmen-Ausgaben-Rechnung führen.", correct:true,
      explain:"Richtig. Einzelunternehmen und Personengesellschaften dürfen bei einem Umsatz unter 700.000 Euro die einfachere Einnahmen-Ausgaben-Rechnung nutzen." },
    { text:"Die Cashflowrechnung wird in die Bereiche Aktiva, Passiva und Eigenkapital gegliedert.", correct:false,
      explain:"Falsch. Die Cashflowrechnung gliedert sich in Betriebstätigkeit, Investitionstätigkeit und Finanzierungstätigkeit – Aktiva/Passiva/Eigenkapital sind Bestandteile der Bilanz." }
  ]
},


/* ============================================================
   MARKETING
   ============================================================ */
{ id:"m1", topic:"marketing", difficulty:"mittel",
  title:"Grundverständnis Marketing und Marketing-Mix",
  stem:"Welche der folgenden Aussagen zum Marketing ist/sind korrekt?",
  statements:[
    { text:"Marketing umfasst ausschließlich Werbung und Verkaufsförderung.", correct:false,
      explain:"Falsch. Marketing ist die systematische Ausrichtung des gesamten Unternehmens an den Kundenbedürfnissen. Werbung ist nur ein kleiner Teilbereich davon." },
    { text:"Die vier klassischen Bereiche des Marketing-Mix sind Product, Price, Place und Promotion.", correct:true,
      explain:"Richtig. Das sind die '4 Ps': Produkt-, Preis-, Distributions- und Kommunikationspolitik." },
    { text:"Im Marketing gelten nur physisch greifbare Güter als 'Produkt'.", correct:false,
      explain:"Falsch. Auch Dienstleistungen, Organisationen, Ideen, Personen oder Orte können vermarktet werden und gelten im Marketing als 'Produkt'." },
    { text:"Die Distributionspolitik (Place) betrifft die Frage, über welche Absatzwege das Produkt zu den Kund:innen gelangt.", correct:true,
      explain:"Richtig. Die Distributionspolitik regelt den Absatzweg (z. B. Groß-/Einzelhandel, eigene Filialen, Internet, Franchising) und den Transportweg." },
    { text:"Die USP (Unique Selling Proposition) ist ein Alleinstellungsmerkmal, das ein Produkt unverwechselbar von der Konkurrenz abhebt.", correct:true,
      explain:"Richtig. Die USP macht ein Produkt für die Zielgruppe besonders wünschenswert und unterscheidbar von Mitbewerbern." }
  ]
},

{ id:"m2", topic:"marketing", difficulty:"schwer",
  title:"Marktkennzahlen und Marktanteil",
  scenario:"Unternehmen A erzielt mit einem Produkt einen Umsatz von 4 Mio. Euro. Das gesamte Marktvolumen für dieses Produkt beträgt 20 Mio. Euro; der größte Mitbewerber erzielt 8 Mio. Euro Umsatz.",
  stem:"Welche der folgenden Aussagen ist/sind korrekt?",
  statements:[
    { text:"Der absolute Marktanteil von Unternehmen A beträgt 20 %.", correct:true,
      explain:"Richtig. Absoluter Marktanteil = (Unternehmensumsatz ÷ Marktvolumen) × 100 = (4 ÷ 20) × 100 = 20 %." },
    { text:"Der relative Marktanteil von Unternehmen A beträgt 0,5.", correct:true,
      explain:"Richtig. Relativer Marktanteil = Unternehmensumsatz ÷ Umsatz des größten Mitbewerbers = 4 ÷ 8 = 0,5." },
    { text:"Aufgrund seines relativen Marktanteils ist Unternehmen A der Marktführer.", correct:false,
      explain:"Falsch. Ein relativer Marktanteil unter 1 zeigt, dass A NICHT Marktführer ist – Marktführerschaft läge erst bei einem Wert über 1 vor." },
    { text:"Das Marktpotenzial ist die tatsächlich verkaufte Menge eines Produkts.", correct:false,
      explain:"Falsch. Das Marktpotenzial ist die maximal mögliche Absatzmenge. Die tatsächlich verkaufte Menge ist das Marktvolumen." },
    { text:"Liegt das Marktvolumen nahe am Marktpotenzial, ist der Markt nahezu gesättigt.", correct:true,
      explain:"Richtig. Ist das Marktvolumen nahe am Marktpotenzial, kann kaum mehr verkauft werden – der Markt ist beinahe gesättigt." }
  ]
},

{ id:"m3", topic:"marketing", difficulty:"schwer",
  title:"Produktlebenszyklus und Produktpolitik",
  stem:"Welche der folgenden Aussagen zum Produktlebenszyklus und zur Produktpolitik ist/sind korrekt?",
  statements:[
    { text:"In der Reifephase erreicht der Umsatz typischerweise sein Maximum, während die Gewinne wegen zunehmender Konkurrenz bereits wieder sinken.", correct:true,
      explain:"Richtig. In der Reifephase ist der Umsatz am höchsten, die Gewinne sinken jedoch durch höheren Werbe- und Rabattaufwand." },
    { text:"In der Einführungsphase wird in der Regel sofort ein hoher Gewinn erzielt.", correct:false,
      explain:"Falsch. In der Einführungsphase sind die Entwicklungs- und Werbekosten hoch; Gewinn wird meist erst gegen Ende dieser Phase erzielt – wenn überhaupt." },
    { text:"Erweitert ein Fahrradhersteller sein Sortiment um Sportbekleidung und Fitnessgeräte, handelt es sich um Produktdiversifikation.", correct:true,
      explain:"Richtig. Wird das Sortiment um neue, andersartige Kategorien verbreitert, spricht man von Produktdiversifikation; eine Vertiefung des bestehenden Sortiments wäre Produktdifferenzierung." },
    { text:"Bei der Produktvariation wird neben der neuen auch die vorherige Version des Produkts weiterhin angeboten.", correct:false,
      explain:"Falsch. Bei der Produktvariation wird nur noch die veränderte Version angeboten; die Vorgängerversion wird nicht weitergeführt." },
    { text:"Beim Geltungsnutzen geht es um das Prestige, sich ein bestimmtes Produkt leisten zu können.", correct:true,
      explain:"Richtig. Der Geltungsnutzen ist ein Zusatznutzen und betrifft das Prestige bzw. den Status, den ein Produkt vermittelt." }
  ]
},

{ id:"m4", topic:"marketing", difficulty:"mittel",
  title:"Preis, Distribution und Käuferverhalten",
  stem:"Welche der folgenden Aussagen zur Preis- und Distributionspolitik ist/sind korrekt?",
  statements:[
    { text:"Ein Verkäufermarkt liegt vor, wenn die Nachfrage das Angebot übersteigt und Verkäufer:innen mehr Verhandlungsmacht haben.", correct:true,
      explain:"Richtig. Im Verkäufermarkt übersteigt die Nachfrage das Angebot, Preise tendieren nach oben, Verkäufer:innen sind im Vorteil." },
    { text:"Beim Snob-Effekt wird ein teures Produkt vor allem gekauft, weil andere es ebenfalls kaufen.", correct:false,
      explain:"Falsch. Das beschreibt den Mitläufer-Effekt. Beim Snob-Effekt kauft man teuer, um zu zeigen, dass man es sich leisten kann." },
    { text:"Beim direkten Absatzweg verkauft das produzierende Unternehmen ohne zwischengeschaltete Handelsbetriebe an den Endabnehmer.", correct:true,
      explain:"Richtig. Beim direkten Absatz gibt es keine Zwischenhändler; beim indirekten Absatz sind Groß- oder Einzelhändler dazwischengeschaltet." },
    { text:"Beim Franchising ist der Franchisenehmer ein unselbstständiger Angestellter des Franchisegebers.", correct:false,
      explain:"Falsch. Der Franchisenehmer ist rechtlich und wirtschaftlich selbstständig, aber an das Marketingkonzept des Franchisegebers gebunden." },
    { text:"Der Qualitätseffekt beschreibt die Vermutung, dass teurere Produkte besser sind als günstigere.", correct:true,
      explain:"Richtig. Beim Qualitätseffekt schließen Käufer:innen vom höheren Preis auf eine höhere Qualität." }
  ]
},


/* ============================================================
   DIGITALISIERUNG
   ============================================================ */
{ id:"d1", topic:"digitalisierung", difficulty:"schwer",
  title:"Internet und World Wide Web",
  stem:"Welche der folgenden Aussagen zum Internet und zum WWW ist/sind korrekt?",
  statements:[
    { text:"Mit seinem Aufsatz 'Information Management: A Proposal' legte Tim Berners-Lee am CERN den Grundstein für das Internet.", correct:false,
      explain:"Falsch. Tim Berners-Lee legte damit den Grundstein für das World Wide Web – einen Dienst, der auf dem Internet aufbaut –, nicht für das Internet selbst." },
    { text:"Die Abkürzung IP steht für 'Identification Protocol'; über die IP-Adresse wird eindeutig die natürliche Person eines Nutzers bestimmt.", correct:false,
      explain:"Falsch. IP steht für 'Internet Protocol'. Eine IP-Adresse adressiert ein Gerät im Netzwerk, sie identifiziert keine natürliche Person eindeutig." },
    { text:"Das World Wide Web ist ein Dienst, der die Infrastruktur des Internets nutzt, um Informationen bereitzustellen und auffindbar zu machen.", correct:true,
      explain:"Richtig. Das WWW ist eine Anwendung bzw. ein Dienst, der auf der Infrastruktur des Internets aufbaut." },
    { text:"Für das Internet und das WWW genügt ein einziges gemeinsames Protokoll; HTTP, HTML und URL sind dafür nicht erforderlich.", correct:false,
      explain:"Falsch. HTTP (Übertragung), HTML (Strukturierung) und URL (Adressierung) sind grundlegende, für ein funktionierendes WWW notwendige Konzepte." },
    { text:"Das Internet ist ein weltweites Netzwerk von Netzwerken, über das sich Daten versenden und empfangen lassen.", correct:true,
      explain:"Richtig. Das Internet ist ein 'Netzwerk von Netzwerken', über das Daten ausgetauscht werden." }
  ]
},

{ id:"d2", topic:"digitalisierung", difficulty:"schwer",
  title:"Client-Server-Architektur und Protokolle",
  stem:"Welche der folgenden Aussagen zur Technik des WWW ist/sind korrekt?",
  statements:[
    { text:"Ein Kommunikationsprotokoll hält Regeln fest, wie Rechner präzise und möglichst unmissverständlich miteinander kommunizieren sollen.", correct:true,
      explain:"Richtig. Ein Kommunikationsprotokoll legt z. B. fest, wie Meldungen formuliert und Antworten gestaltet werden – vergleichbar mit den Konventionen beim Versenden eines Briefes." },
    { text:"Beim Request-Response-Prinzip sendet der Server unaufgefordert Anfragen an den Browser.", correct:false,
      explain:"Falsch. Beim Request-Response-Prinzip stellt der Client (z. B. der Browser) eine Anfrage (request), und der Server liefert eine Antwort (response) – nicht umgekehrt." },
    { text:"In der Client-Server-Architektur kann ein Client wie ein Web-Browser von einem Server Inhalte anfordern.", correct:true,
      explain:"Richtig. Der Client fordert über das Netzwerk Inhalte oder Dienste an, die der Server bereitstellt." },
    { text:"HTML ist ein Protokoll, das festlegt, wie ein Browser Informationen von einem Server anfordert.", correct:false,
      explain:"Falsch. Das beschreibt HTTP. HTML ist eine Sprache zur Strukturierung von Informationen, damit ein Browser sie korrekt darstellen kann." },
    { text:"Ein Server ist im Kern ein Rechner, der über das Netzwerk auf Anfragen wartet und diese beantwortet.", correct:true,
      explain:"Richtig. Ein Server ist ein Rechner, auf dem Server-Software läuft, die Anfragen aus dem Internet bearbeitet." }
  ]
},

{ id:"d3", topic:"digitalisierung", difficulty:"mittel",
  title:"Digitale Geschäftsmodelle und digitale Transformation",
  stem:"Welche der folgenden Aussagen zu digitalen Geschäftsmodellen ist/sind korrekt?",
  statements:[
    { text:"Ein Geschäftsmodell beschreibt, wie ein Unternehmen ein Produkt oder eine Dienstleistung erzeugt, bereitstellt und vertreibt, um einen Gewinn zu erwirtschaften.", correct:true,
      explain:"Richtig. Das Geschäftsmodell beschreibt die Wertschöpfung von der Idee bis zum Vertrieb mit dem Ziel, einen Gewinn zu erzielen." },
    { text:"Bei einem Online-Marktplatz (z. B. willhaben.at) können auch Privatpersonen als Verkäufer:innen auftreten, während ein Webshop typischerweise von einem einzelnen Anbieter betrieben wird.", correct:true,
      explain:"Richtig. Der Marktplatz öffnet die Plattform für viele Anbieter inklusive Privatpersonen; der Webshop wird von einem einzelnen Verkäufer betrieben." },
    { text:"Ein Geschäftsprozess ist eine einmalige, nicht wiederholbare Handlung ohne definierten Anfang oder definiertes Ende.", correct:false,
      explain:"Falsch. Ein Geschäftsprozess ist ein wiederholbarer Arbeitsablauf aus mehreren logisch zusammenhängenden Aktivitäten mit klar definiertem Anfang und Ende." },
    { text:"Der Wechsel eines Anbieters vom Verkauf einzelner Musikstücke (Download) hin zu einem Streaming-Abo ist ein Beispiel für eine Veränderung des Geschäftsmodells.", correct:true,
      explain:"Richtig. Streaming gegen Abo-Gebühr statt Einzelverkauf ist ein grundlegend anderes, durch IT ermöglichtes Geschäftsmodell." },
    { text:"Die 'Backstage'-Dimension der Digitalisierung bezieht sich ausschließlich auf die Außenwerbung eines Unternehmens.", correct:false,
      explain:"Falsch. Die 'Backstage'-Dimension betrifft den internen Fokus – digital unterstützte Geschäftsprozesse hinter den Kulissen, die die Wertschöpfung steuern." }
  ]
}

,

/* ===== GRUNDLAGEN (Erweiterung) ===== */
{ id:"g6", topic:"grundlagen", difficulty:"mittel",
  title:"Arbeitsteilung und Spezialisierung",
  stem:"Welche der folgenden Aussagen zu Arbeitsteilung und Spezialisierung ist/sind korrekt?",
  statements:[
    { text:"Spezialisierung erlaubt es Unternehmen, sich auf weniger Arbeitsschritte zu konzentrieren und dort ihre Kompetenz auszubauen.", correct:true,
      explain:"Richtig. Die Konzentration auf weniger Schritte bringt Produktionsvorteile und ermöglicht oft größere Stückzahlen." },
    { text:"Eine größere Produktionsmenge führt in der Regel zu höheren Stückkosten, weil die Fixkosten auf mehr Stück verteilt werden.", correct:false,
      explain:"Falsch. Die Verteilung der Fixkosten auf mehr Stück senkt die Stückkosten – eine größere Menge bedeutet daher meist niedrigere Kosten pro Stück." },
    { text:"Spezialisierung erhöht die Abhängigkeit von Zulieferern hinsichtlich Qualität und Liefermenge.", correct:true,
      explain:"Richtig. Wer nicht alle Teile selbst erzeugt, ist auf rechtzeitige Lieferungen in passender Qualität angewiesen; Verzögerungen beeinträchtigen die Produktion." },
    { text:"Lange internationale Lieferketten sind in der Regel ökologisch unproblematisch.", correct:false,
      explain:"Falsch. Lange Transportwege über LKW, Containerschiffe oder Flugzeuge bedeuten meist eine hohe Umweltbelastung." },
    { text:"Arbeitsteilung findet ausschließlich innerhalb einzelner Unternehmen statt.", correct:false,
      explain:"Falsch. Arbeitsteilung findet auf mehreren Ebenen statt: innerhalb von Unternehmen, zwischen Unternehmen und sogar zwischen ganzen Ländern." }
  ]
},

{ id:"g7", topic:"grundlagen", difficulty:"mittel",
  title:"Der Wirtschaftskreislauf",
  stem:"Welche der folgenden Aussagen zum Wirtschaftskreislauf ist/sind korrekt?",
  statements:[
    { text:"Am (erweiterten) Wirtschaftskreislauf sind private Haushalte, Unternehmen und der Staat beteiligt.", correct:true,
      explain:"Richtig. Diese drei sind die wesentlichen Wirtschaftsteilnehmer; im erweiterten Modell kommt das Ausland hinzu." },
    { text:"Private Haushalte bieten Arbeitsleistung an und erhalten dafür Lohn und Gehalt.", correct:true,
      explain:"Richtig. Mit diesem Einkommen kaufen sie wiederum Produkte und Dienstleistungen – so schließt sich der Kreislauf." },
    { text:"Der Staat hebt zwar Steuern ein, erbringt aber im Gegenzug keinerlei Leistungen.", correct:false,
      explain:"Falsch. Der Staat erbringt öffentliche Güter und Leistungen (Infrastruktur, Bildung, Sicherheit) und leistet Transferzahlungen." },
    { text:"Innerhalb des Wirtschaftskreislaufs unterscheidet man einen Güterkreislauf und einen Geldkreislauf.", correct:true,
      explain:"Richtig. Güter und Leistungen fließen in die eine, Geld in die andere Richtung." },
    { text:"Banken spielen im Geldkreislauf keine Rolle.", correct:false,
      explain:"Falsch. Banken sind zentral: Sie wickeln den Zahlungsverkehr ab, nehmen Spareinlagen entgegen und vergeben Kredite." }
  ]
},

{ id:"g8", topic:"grundlagen", difficulty:"schwer",
  title:"Außenhandel Österreichs",
  stem:"Welche der folgenden Aussagen zum österreichischen Außenhandel ist/sind korrekt?",
  statements:[
    { text:"Rund 70 % der österreichischen Exporte und Importe erfolgen mit EU-Mitgliedsstaaten.", correct:true,
      explain:"Richtig. Die EU-Mitgliedschaft hat den Handel mit anderen Mitgliedsstaaten erleichtert; der Handel mit Drittstaaten (USA, GB, China) bleibt dennoch wichtig." },
    { text:"Die wichtigsten österreichischen Exportgüter sind Mozartkugeln, Haselnusswaffeln und Sachertorten.", correct:false,
      explain:"Falsch. Die Exportliste führen Maschinen, Fahrzeuge, bearbeitete Waren und chemische Erzeugnisse an – nicht die populären Süßwaren." },
    { text:"Der EU-Binnenmarkt umfasst die vier Grundfreiheiten: freier Waren-, Personen-, Dienstleistungs- und Kapitalverkehr.", correct:true,
      explain:"Richtig. Diese vier Grundfreiheiten sind das Kernstück des EU-Binnenmarkts." },
    { text:"Als großes Binnenland ist Österreich kaum auf den Außenhandel angewiesen.", correct:false,
      explain:"Falsch. Österreich ist ein kleines, stark exportorientiertes Binnenland; die Exportquote liegt bei rund 50 % der Wirtschaftsleistung." },
    { text:"Die Exportquote misst die Waren- und Dienstleistungsexporte in Prozent des Bruttoinlandsprodukts.", correct:true,
      explain:"Richtig. 2023 lag sie bei etwa 50 % – fünf von zehn in Österreich erwirtschafteten Euro stammen aus dem Außenhandel." }
  ]
},

{ id:"g9", topic:"grundlagen", difficulty:"schwer",
  title:"Marktgleichgewicht und Ungleichgewicht",
  stem:"Welche der folgenden Aussagen zur Preisbildung am Markt ist/sind korrekt?",
  statements:[
    { text:"Beim Markträumungspreis gibt es in der Regel keine Preistendenz nach oben oder unten.", correct:true,
      explain:"Richtig. Im Gleichgewicht entspricht die angebotene der nachgefragten Menge, der Markt wird vollständig geräumt." },
    { text:"Ein Preis unterhalb des Gleichgewichts führt zu einer Fehlmenge, weil die Nachfrage steigt und das Angebot sinkt.", correct:true,
      explain:"Richtig. Ein zu niedriger Preis erzeugt einen Nachfrageüberhang (Fehlmenge)." },
    { text:"Höhere Preise stimulieren die Nachfrage und dämpfen das Angebot.", correct:false,
      explain:"Falsch. Umgekehrt: Höhere Preise dämpfen die Nachfrage und stimulieren das Angebot, sodass die Preise tendenziell wieder sinken." },
    { text:"Über die Koordinierungsfunktion des Preises kehren Märkte tendenziell zum Gleichgewicht zurück.", correct:true,
      explain:"Richtig. Der Preis koordiniert die Entscheidungen von Anbietern und Nachfragern und treibt den Markt Richtung Gleichgewicht." },
    { text:"Der Preis ist auch ein Indikator für die Knappheit eines Gutes.", correct:true,
      explain:"Richtig. Ein hoher Preis signalisiert in der Regel ein knappes Gut bei hoher Nachfrage." }
  ]
},

{ id:"g10", topic:"grundlagen", difficulty:"schwer",
  title:"Verschiebung von Angebot und Nachfrage",
  stem:"Welche der folgenden Aussagen zu den Einflussfaktoren auf Angebot und Nachfrage ist/sind korrekt?",
  statements:[
    { text:"Sinkt das Einkommen der Nachfrager, verschiebt sich die Nachfragekurve nach links.", correct:true,
      explain:"Richtig. Bei niedrigerem Einkommen können sich weniger Personen das Gut leisten, die Nachfrage sinkt bei jedem Preisniveau." },
    { text:"Treten mehr Anbieter in einen Markt ein, verschiebt sich die Angebotskurve nach rechts.", correct:true,
      explain:"Richtig. Mehr Anbieter erhöhen die angebotene Menge bei jedem Preisniveau." },
    { text:"Erwarten Anbieter fallende Preise, erhöhen sie typischerweise ihr Angebot.", correct:false,
      explain:"Falsch. Bei der Erwartung fallender Preise reduzieren Anbieter eher ihr Angebot bzw. ziehen sich zurück." },
    { text:"Ein Trend zugunsten eines Produkts (steigende Präferenz) erhöht dessen Nachfrage.", correct:true,
      explain:"Richtig. Steigende Präferenzen verschieben die Nachfragekurve nach rechts." },
    { text:"Technische Weiterentwicklungen und fallende Ressourcenkosten verringern in der Regel das Angebot.", correct:false,
      explain:"Falsch. Sie können mehr Anbieter veranlassen, in den Markt einzutreten, und erhöhen damit eher das Angebot." }
  ]
},

{ id:"g11", topic:"grundlagen", difficulty:"schwer",
  title:"Grenzkosten und Angebotsentscheidung",
  stem:"Welche der folgenden Aussagen zu Grenzkosten und Angebot ist/sind korrekt?",
  statements:[
    { text:"Grenzkosten sind die Kosten für die Herstellung einer zusätzlichen Einheit eines Gutes.", correct:true,
      explain:"Richtig. Sie betreffen die jeweils nächste produzierte Einheit." },
    { text:"Für viele Unternehmen steigen die Grenzkosten mit zunehmender Produktionsmenge.", correct:true,
      explain:"Richtig. Produktionssteigerungen erfordern oft zusätzliche Anlagen und Personal, wodurch die Grenzkosten steigen." },
    { text:"Ein Unternehmen weitet die Produktion sinnvollerweise aus, solange der erzielbare Preis unter den Grenzkosten liegt.", correct:false,
      explain:"Falsch. Eine Ausweitung lohnt sich nur, wenn der erzielbare Preis höher oder zumindest gleich den Grenzkosten ist." },
    { text:"Verkauft ein Anbieter nicht, obwohl er einen guten Preis erzielen könnte, entstehen ihm Opportunitätskosten.", correct:true,
      explain:"Richtig. Der nicht erzielte Preis ist sein entgangener Ertrag – also seine Opportunitätskosten." },
    { text:"Die angebotene Menge ist unabhängig vom erzielbaren Verkaufspreis.", correct:false,
      explain:"Falsch. Unter ceteris-paribus-Bedingungen gilt: Je höher der erzielbare Preis, desto höher die angebotene Menge." }
  ]
},

{ id:"g12", topic:"grundlagen", difficulty:"mittel",
  title:"Funktionen und Formen von Geld",
  stem:"Welche der folgenden Aussagen zu den Funktionen und Formen von Geld ist/sind korrekt?",
  statements:[
    { text:"Geld dient als Tauschmittel, als Wertmesser und als Wertaufbewahrungsmittel.", correct:true,
      explain:"Richtig. Das sind die drei zentralen Funktionen des Geldes." },
    { text:"Die Akzeptanz von Geld beruht wesentlich auf dem Vertrauen, es wieder gegen Güter eintauschen zu können.", correct:true,
      explain:"Richtig. Ohne dieses Vertrauen in den Tauschwert würden die Geldfunktionen nicht greifen." },
    { text:"Bargeld wird in der Regel verzinst, Buchgeld dagegen nicht.", correct:false,
      explain:"Falsch. Umgekehrt: Guthaben (Buchgeld) wird in der Regel – wenn auch oft gering – verzinst, Bargeld verzinst sich nicht." },
    { text:"Der bei weitem größere Teil des im Umlauf befindlichen Geldes liegt als Buchgeld vor.", correct:true,
      explain:"Richtig. Obwohl Buchgeld nicht physisch greifbar ist, macht es den größten Teil der Geldmenge aus." },
    { text:"Buchgeld ist weniger wert als die gleiche Summe in Bargeld.", correct:false,
      explain:"Falsch. Buchgeld ist genauso viel wert wie Bargeld – solange das Vertrauen besteht, es eintauschen zu können." }
  ]
},

{ id:"g13", topic:"grundlagen", difficulty:"schwer",
  title:"Währung und Wechselkurs",
  stem:"Welche der folgenden Aussagen zu Währung und Wechselkurs ist/sind korrekt?",
  statements:[
    { text:"Der Wechselkurs ist der Preis einer Währung, ausgedrückt in einer anderen Währung.", correct:true,
      explain:"Richtig. Beispiel: 1 Euro = 1,2 US-Dollar bedeutet, dass 1 Euro 1,2 US-Dollar kostet." },
    { text:"Steigt der Wert des Euro gegenüber dem Dollar, bekommt man für einen Euro weniger Dollar.", correct:false,
      explain:"Falsch. Steigt der Euro gegenüber dem Dollar, bekommt man für einen Euro MEHR Dollar und kann sich im Dollarraum mehr leisten." },
    { text:"Für den Tausch von Bargeld werden Valutenkurse angewandt, ansonsten Devisenkurse.", correct:true,
      explain:"Richtig. Bargeld wird zu Valutenkursen, unbarer Zahlungsverkehr zu Devisenkursen umgerechnet." },
    { text:"Der Ankaufskurs ist jener Kurs, zu dem die Bank Fremdwährung verkauft.", correct:false,
      explain:"Falsch. Der Ankaufskurs ist der Kurs, zu dem die Bank Fremdwährung ANKAUFT; der Verkaufskurs ist jener, zu dem sie verkauft." },
    { text:"Der Außenwert einer Währung wird gegenüber einem gewichteten Korb ausländischer Währungen ermittelt.", correct:true,
      explain:"Richtig. Die bilateralen Wechselkurse werden – meist nach Handelsvolumen gewichtet – zu einem multilateralen Wechselkurs zusammengefasst." }
  ]
},

{ id:"g14", topic:"grundlagen", difficulty:"schwer",
  title:"Zinsen",
  stem:"Welche der folgenden Aussagen zu Zinsen ist/sind korrekt?",
  statements:[
    { text:"Zinsen sind der Preis für das Ausborgen von Geld.", correct:true,
      explain:"Richtig. Wer Geld verleiht, erhält Zinsen; wer Geld ausborgt, zahlt Zinsen." },
    { text:"Der Gläubiger ist jene Person, die Geld ausborgt und Zinsen zahlt.", correct:false,
      explain:"Falsch. Der Gläubiger verleiht Geld und erhält Zinsen. Wer Geld ausborgt und Zinsen zahlt, ist der Schuldner." },
    { text:"Das Dubiosenrisiko bezeichnet das Risiko, dass der Schuldner das Geld nicht zurückzahlen kann.", correct:true,
      explain:"Richtig. Für dieses Ausfallrisiko möchte der Gläubiger über die Zinsen entschädigt werden." },
    { text:"Das Geldwertrisiko entschädigt den Gläubiger dafür, dass die Preise während der Laufzeit steigen könnten.", correct:true,
      explain:"Richtig. Steigt das Preisniveau, kann sich der Gläubiger für den zurückgezahlten Betrag weniger leisten – dafür sollen die Zinsen entschädigen." },
    { text:"Sinkt die Nachfrage nach Krediten zu stark, kann sie durch höhere Zinssätze wieder stimuliert werden.", correct:false,
      explain:"Falsch. Eine zu niedrige Kreditnachfrage wird durch NIEDRIGERE Zinssätze stimuliert, nicht durch höhere." }
  ]
},

{ id:"g15", topic:"grundlagen", difficulty:"schwer",
  title:"Ursachen der Inflation",
  stem:"Welche der folgenden Aussagen zu den Ursachen der Inflation ist/sind korrekt?",
  statements:[
    { text:"Eine rasche Zunahme der umlaufenden Geldmenge kann Inflation begünstigen.", correct:true,
      explain:"Richtig. Ist im Verhältnis zu den Gütern zu viel Geld im Umlauf, das auch ausgegeben wird, steigt die Inflationsgefahr." },
    { text:"Buchgeldschöpfung bezeichnet die Zunahme an Buchgeld durch die Kreditvergabe der Banken.", correct:true,
      explain:"Richtig. Durch zusätzliche Kredite vermehrt sich das Buchgeld – das wird Buchgeldschöpfung genannt." },
    { text:"Steigende Importpreise durch Wechselkursänderungen können zu importierter Inflation führen.", correct:true,
      explain:"Richtig. Verteuern sich Importe (auch wechselkursbedingt), steigen die Produktionskosten und damit die Preise." },
    { text:"Zur Inflationsbekämpfung senken Zentralbanken üblicherweise das Zinsniveau.", correct:false,
      explain:"Falsch. Zur Inflationsbekämpfung wird das Zinsniveau in der Regel ERHÖHT, um die Kreditvergabe und damit die Geldmenge zu bremsen." },
    { text:"Die Lohn-Preis-Spirale beschreibt, wie steigende Löhne und steigende Preise sich gegenseitig verstärken.", correct:true,
      explain:"Richtig. Höhere Preise führen zu Lohnforderungen, höhere Löhne erhöhen die Kosten und damit wieder die Preise." }
  ]
},

{ id:"g16", topic:"grundlagen", difficulty:"mittel",
  title:"Messung der Inflation",
  stem:"Welche der folgenden Aussagen zur Inflationsmessung ist/sind korrekt?",
  statements:[
    { text:"Die Inflationsrate wird auf Basis des Verbraucherpreisindex (VPI) berechnet.", correct:true,
      explain:"Richtig. Monatlich werden die Preise bestimmter Waren und Dienstleistungen erhoben und verglichen." },
    { text:"Der Warenkorb des VPI enthält rund 80 Produkte und Dienstleistungen.", correct:false,
      explain:"Falsch. Der Warenkorb umfasst rund 800 verschiedene Produkte und Dienstleistungen eines durchschnittlichen Haushalts." },
    { text:"Der Harmonisierte Verbraucherpreisindex (HVPI) dient dem vergleichbaren Inflationsvergleich in Europa.", correct:true,
      explain:"Richtig. Der HVPI ist die Grundlage für die vergleichbare Inflationsmessung und die Bewertung der Geldwertstabilität in der Eurozone." },
    { text:"Der VPI wird auch zur Wertsicherung von Geldbeträgen, etwa Mieten, verwendet.", correct:true,
      explain:"Richtig. Steigt der Index, werden indexgebundene Zahlungen wie Mieten angepasst." },
    { text:"Der Mikrowarenkorb (Index des täglichen Bedarfs) zeigt im Schnitt geringere Preisschwankungen als der VPI.", correct:false,
      explain:"Falsch. Die Preise im Mikrowarenkorb schwankten im Schnitt stärker als jene, anhand derer der VPI berechnet wird." }
  ]
},

{ id:"g17", topic:"grundlagen", difficulty:"mittel",
  title:"Preisstabilität und Binnenwert",
  stem:"Welche der folgenden Aussagen zu Preisstabilität und Geldwert ist/sind korrekt?",
  statements:[
    { text:"Die EZB sieht eine Inflationsrate von rund 2 % pro Jahr als bestmöglich für die Preisstabilität an.", correct:true,
      explain:"Richtig. Bei deutlich höherer Inflation wird der Preisanstieg zu stark wahrgenommen." },
    { text:"Durch Inflation sinkt der Binnenwert des Geldes.", correct:true,
      explain:"Richtig. Steigende Preise verringern die Kaufkraft im Inland – der Binnenwert sinkt." },
    { text:"Der Binnenwert einer Währung beschreibt das Verhältnis zu Fremdwährungen.", correct:false,
      explain:"Falsch. Das ist der Außenwert. Der Binnenwert betrifft die Kaufkraft im Inland." },
    { text:"Bei zu hoher Inflation wird der Preisanstieg von den Wirtschaftsteilnehmern deutlich wahrgenommen.", correct:true,
      explain:"Richtig. Gerade deshalb gilt eine moderate Rate nahe 2 % als günstig für eine stabile Wirtschaftsentwicklung." },
    { text:"Der Warenkorb wird jährlich an die Konsumgewohnheiten der Bevölkerung angepasst.", correct:false,
      explain:"Falsch. Die Produkte und Dienstleistungen des Warenkorbs werden alle 5 Jahre angepasst." }
  ]
},

{ id:"g18", topic:"grundlagen", difficulty:"schwer",
  title:"BIP und BNP im Vergleich",
  stem:"Welche der folgenden Aussagen zum BIP und BNP ist/sind korrekt?",
  statements:[
    { text:"Das BNP erfasst die weltweit von Inländern mit ihren Produktionsfaktoren erzielten Einkommen.", correct:true,
      explain:"Richtig. Beim BNP ist nicht relevant, ob das Einkommen im In- oder Ausland anfällt, sondern wer es erwirtschaftet." },
    { text:"Bei kleinen Volkswirtschaften können BIP und BNP stark voneinander abweichen.", correct:true,
      explain:"Richtig. Bei großen Volkswirtschaften sind sie meist ähnlich, bei kleinen (z. B. Luxemburg) kann der Unterschied groß sein." },
    { text:"Das BNP wurde früher als Bruttosozialprodukt (BSP) bezeichnet.", correct:true,
      explain:"Richtig. Das BNP wird auch Bruttonationaleinkommen (BNE) genannt und hieß früher Bruttosozialprodukt (BSP)." },
    { text:"Das BIP pro Kopf sagt zuverlässig etwas über die Nachhaltigkeit der Wirtschaftsleistung aus.", correct:false,
      explain:"Falsch. Das BIP sagt nichts über die Qualität oder Nachhaltigkeit der Wirtschaftsleistung aus – das ist ein zentraler Kritikpunkt." },
    { text:"Eine Naturkatastrophe, die Wiederaufbauarbeiten auslöst, senkt das BIP.", correct:false,
      explain:"Falsch. Solche Sanierungs- und Wiederaufbauarbeiten würden das BIP sogar erhöhen – ein weiterer Kritikpunkt am BIP." }
  ]
},

/* ===== NACHHALTIGKEIT (Erweiterung) ===== */
{ id:"n4", topic:"nachhaltigkeit", difficulty:"mittel",
  title:"Brundtland-Bericht und nachhaltige Entwicklung",
  stem:"Welche der folgenden Aussagen zur nachhaltigen Entwicklung ist/sind korrekt?",
  statements:[
    { text:"Der Brundtland-Bericht 'Our Common Future' wurde 1987 veröffentlicht.", correct:true,
      explain:"Richtig. Der Bericht der Weltkommission für Umwelt und Entwicklung (WCED) erschien 1987." },
    { text:"Gro Harlem Brundtland war Vorsitzende der zuständigen Kommission.", correct:true,
      explain:"Richtig. Nach ihr ist der Bericht auch benannt." },
    { text:"Nachhaltige Entwicklung verzichtet laut Brundtland-Bericht vollständig auf Wirtschaftswachstum.", correct:false,
      explain:"Falsch. Der Bericht fordert eine NEUE Art von Wachstum, die die Umwelt weit weniger belastet – nicht den vollständigen Verzicht auf Wachstum." },
    { text:"Nachhaltigkeit verknüpft die drei Dimensionen Ökologie, Ökonomie und Soziales.", correct:true,
      explain:"Richtig. Nachhaltiges Handeln strebt an, diese drei Dimensionen in Einklang zu bringen." },
    { text:"Kurzfristige Umweltentscheidungen können laut Bericht zu künftigen wirtschaftlichen Problemen führen.", correct:true,
      explain:"Richtig. Wirtschaftswachstum darf nicht durch seine Umweltauswirkungen zu künftigen wirtschaftlichen Problemen führen." }
  ]
},

{ id:"n5", topic:"nachhaltigkeit", difficulty:"schwer",
  title:"Kapitalarten und Substituierbarkeit",
  stem:"Welche der folgenden Aussagen zu schwacher und starker Nachhaltigkeit ist/sind korrekt?",
  statements:[
    { text:"Das Drei-Säulen-Modell betrachtet Ökologie, Soziales und Ökonomie als gleichwertige Säulen.", correct:true,
      explain:"Richtig. Es bildet die Grundlage der schwachen Nachhaltigkeit." },
    { text:"Schwache Nachhaltigkeit erlaubt, Naturkapital durch Human- oder Sachkapital zu ersetzen, solange die Gesamtsumme aller Kapitalarten konstant bleibt.", correct:true,
      explain:"Richtig. Genau diese Substituierbarkeit kennzeichnet die schwache Nachhaltigkeit." },
    { text:"Zum Naturkapital zählen z. B. Wälder, Bodenschätze und Biodiversität.", correct:true,
      explain:"Richtig. Naturkapital umfasst die natürlichen Ressourcen und Ökosysteme." },
    { text:"Humankapital bezeichnet die Produktionsanlagen in Fabriken.", correct:false,
      explain:"Falsch. Produktionsanlagen sind Sachkapital. Humankapital meint die Bildung und Qualifikation der Arbeitskräfte." },
    { text:"Starke Nachhaltigkeit hält die Substituierbarkeit von Naturkapital für problemlos möglich.", correct:false,
      explain:"Falsch. Die starke Nachhaltigkeit lehnt die Substituierbarkeit von Naturkapital gerade ab." }
  ]
},

{ id:"n6", topic:"nachhaltigkeit", difficulty:"schwer",
  title:"Entkopplung von Wachstum und Umweltschäden",
  stem:"Welche der folgenden Aussagen zur Entkopplung ist/sind korrekt?",
  statements:[
    { text:"Relative Entkopplung liegt vor, wenn die Umweltschäden langsamer zunehmen als die Wirtschaftsleistung.", correct:true,
      explain:"Richtig. Emissionen oder Ressourcenverbrauch steigen noch, aber weniger stark als das BIP." },
    { text:"Bei absoluter Entkopplung sinkt die Umweltbelastung, während die Wirtschaftsleistung zunimmt.", correct:true,
      explain:"Richtig. Beispiel: BIP steigt um 3 %, die CO₂-Emissionen sinken um 4 %." },
    { text:"Nur relative Entkopplung gewährleistet, dass Wirtschaft nicht länger auf Kosten ökologischer Stabilität wächst.", correct:false,
      explain:"Falsch. Nur die ABSOLUTE Entkopplung stellt sicher, dass Entwicklung nicht länger auf Kosten der Ökologie erfolgt." },
    { text:"Eine absolute Entkopplung bei CO₂ ist bislang flächendeckend und einfach erreicht worden.", correct:false,
      explain:"Falsch. Bei CO₂ ist absolute Entkopplung besonders schwierig und bisher nur in wenigen Bereichen und Staaten nachweisbar." },
    { text:"Eine absolute Entkopplung gelang etwa bei Schadstoffen wie Schwefeldioxid (SO₂) oder FCKW.", correct:true,
      explain:"Richtig. Dank technischer Ersatzstoffe und internationaler Umweltabkommen wurde hier absolute Entkopplung erreicht." }
  ]
},

{ id:"n7", topic:"nachhaltigkeit", difficulty:"schwer",
  title:"Rebound-Effekt und Carbon Leakage",
  stem:"Welche der folgenden Aussagen zu strukturellen Herausforderungen der Entkopplung ist/sind korrekt?",
  statements:[
    { text:"Der Rebound-Effekt bedeutet, dass Effizienzgewinne durch höheren Gesamtverbrauch teilweise wieder aufgehoben werden.", correct:true,
      explain:"Richtig. Effizientere Technologien senken Kosten, was die Gesamtnachfrage nach Energie und Gütern erhöhen kann." },
    { text:"Carbon Leakage bezeichnet die Verlagerung von Produktion und Emissionen in andere Weltregionen.", correct:true,
      explain:"Richtig. Ein Teil scheinbarer Emissionsreduktionen ist auf solche Verlagerungen in Länder mit laxeren Standards zurückzuführen." },
    { text:"Absolute Entkopplung ist allein eine technologische Herausforderung.", correct:false,
      explain:"Falsch. Sie ist vor allem eine strukturelle und institutionelle Herausforderung; technologische Innovation allein reicht nicht." },
    { text:"Energieeffizientere Geräte können durch vermehrte Nutzung zu mehr Gesamtverbrauch führen.", correct:true,
      explain:"Richtig. Das ist ein typisches Beispiel für den Rebound-Effekt." },
    { text:"Carbon Capture and Storage (CCS) ist in Österreich uneingeschränkt für alle Branchen erlaubt.", correct:false,
      explain:"Falsch. In Österreich ist CCS nur für 'hard-to-abate'-Branchen (z. B. Teile der Zement- und Abfallindustrie, Luftfahrt) erlaubt." }
  ]
},

{ id:"n8", topic:"nachhaltigkeit", difficulty:"schwer",
  title:"Planetare Grenzen und 1,5-Grad-Ziel",
  stem:"Welche der folgenden Aussagen zu planetaren Grenzen und Klimazielen ist/sind korrekt?",
  statements:[
    { text:"Das Konzept der planetaren Grenzen wurde von Johan Rockström und Kolleg:innen entwickelt.", correct:true,
      explain:"Richtig. Es definiert einen sicheren Handlungsraum (safe operating space) für die Menschheit." },
    { text:"Laut Planetary Health Check 2025 sind sieben der neun planetaren Grenzen überschritten.", correct:true,
      explain:"Richtig. Sieben von neun Grenzen sind überschritten." },
    { text:"Die 1,5-Grad-Grenze ist laut Rockström weniger eine feste Erdsystemgrenze als eine politische Willensbekundung.", correct:true,
      explain:"Richtig. Sie basiert primär auf politischer Entscheidungsfindung und wissenschaftlichen Risikobewertungen." },
    { text:"Die Wahl der 1,5-Grad-Grenze geht auf das Kyoto-Protokoll von 1997 zurück.", correct:false,
      explain:"Falsch. Sie geht auf das Pariser Abkommen von 2015 zurück, geprägt durch den Druck besonders vulnerabler Staaten." },
    { text:"Um die Klimakrise zu bewältigen, müssen auch die übrigen planetaren Grenzen intakt bleiben.", correct:true,
      explain:"Richtig. Die Klimagrenze allein einzuhalten genügt nicht – die planetaren Grenzen hängen zusammen." }
  ]
},

{ id:"n9", topic:"nachhaltigkeit", difficulty:"mittel",
  title:"Lineares Modell und Kreislaufwirtschaft",
  stem:"Welche der folgenden Aussagen zur Kreislaufwirtschaft ist/sind korrekt?",
  statements:[
    { text:"In der Kreislaufwirtschaft werden Abfälle minimiert und Ressourcen im Kreislauf gehalten.", correct:true,
      explain:"Richtig. Durch Wiederverwendung, Reparatur und Recycling bleibt der Ressourcenwert möglichst lange erhalten." },
    { text:"Das lineare Wirtschaftsmodell folgt dem Prinzip 'Take – Make – Waste'.", correct:true,
      explain:"Richtig. Rohstoffe werden entnommen, verarbeitet, genutzt und entsorgt." },
    { text:"Regenerative Ressourcenströme sind ein Kennzeichen des linearen Modells.", correct:false,
      explain:"Falsch. Regenerative Ressourcenströme kennzeichnen gerade die neuen, kreislauforientierten Modelle, nicht das lineare." },
    { text:"Die derzeitige lineare Wirtschaftsweise trägt zum Überschreiten planetarer Grenzen bei.", correct:true,
      explain:"Richtig. Sie destabilisiert zentrale Erdsysteme und erhöht den Druck auf die planetaren Grenzen." },
    { text:"Kreislaufwirtschaft zielt darauf ab, den Ressourcenverbrauch durch immer kürzere Produktlebensdauern zu erhöhen.", correct:false,
      explain:"Falsch. Ziel ist gerade der Werterhalt und längere Lebensdauern, nicht ein höherer Verbrauch." }
  ]
},

{ id:"n10", topic:"nachhaltigkeit", difficulty:"schwer",
  title:"Kohlenstoffbudget und Donut-Modell",
  stem:"Welche der folgenden Aussagen zu Kohlenstoffbudget und Wohlstandsgrenzen ist/sind korrekt?",
  statements:[
    { text:"Das Kohlenstoffbudget bezeichnet die maximale CO₂-Menge, die noch emittiert werden darf, ohne eine bestimmte Erwärmungsgrenze zu überschreiten.", correct:true,
      explain:"Richtig. Es dient als Leitgröße für Klimaschutzmaßnahmen und Reduktionsziele." },
    { text:"Das Kohlenstoffbudget wird in Gigatonnen CO₂ (GtCO₂) angegeben.", correct:true,
      explain:"Richtig. So lässt sich die noch verbleibende Emissionsmenge beziffern." },
    { text:"Das Donut-Modell kombiniert ein soziales Fundament mit einer ökologischen Decke (planetare Belastungsgrenzen).", correct:true,
      explain:"Richtig. Zwischen sozialem Fundament und ökologischer Decke liegt der sichere und gerechte Handlungsraum." },
    { text:"Suffizienz bedeutet, den Konsum immer weiter zu steigern.", correct:false,
      explain:"Falsch. Suffizienz steht für 'genug, aber nicht zu viel' – also für ein bewusstes Maßhalten beim Konsum." },
    { text:"Ziel nachhaltiger Wirtschaft ist ein gutes Leben für alle innerhalb der planetaren Grenzen.", correct:true,
      explain:"Richtig. Das ist die Kernidee des Wirtschaftens innerhalb der Erdsystemgrenzen." }
  ]
}
,

/* ===== UNTERNEHMEN (Erweiterung) ===== */
{ id:"u5", topic:"unternehmen", difficulty:"mittel",
  title:"Wirtschaftssektoren",
  stem:"Welche der folgenden Aussagen zu den Wirtschaftssektoren ist/sind korrekt?",
  statements:[
    { text:"Der primäre Sektor umfasst die Rohstoffgewinnung, insbesondere Land- und Forstwirtschaft.", correct:true,
      explain:"Richtig. Auch Anbau und Ernte von Früchten zählen zum primären Sektor." },
    { text:"Der sekundäre Sektor umfasst Handel, Tourismus und sonstige Dienstleistungen.", correct:false,
      explain:"Falsch. Das ist der tertiäre Sektor. Der sekundäre Sektor umfasst die Industrie und das produzierende Gewerbe." },
    { text:"Eine Steuerberaterin, die Bilanzen für Unternehmen erstellt, ist im tertiären Sektor tätig.", correct:true,
      explain:"Richtig. Dienstleistungen zählen zum tertiären Sektor." },
    { text:"Der Anteil des tertiären Sektors an der Wirtschaftsleistung in Österreich beträgt rund 70 %.", correct:true,
      explain:"Richtig. Mit steigender wirtschaftlicher Entwicklung gewinnt der Dienstleistungssektor an Bedeutung." },
    { text:"Mit steigender wirtschaftlicher Entwicklung sinkt typischerweise der Anteil des tertiären Sektors.", correct:false,
      explain:"Falsch. Der Anteil des tertiären Sektors STEIGT in der Regel mit dem Entwicklungsgrad eines Landes." }
  ]
},

{ id:"u6", topic:"unternehmen", difficulty:"mittel",
  title:"KMU und Größenklassen",
  stem:"Welche der folgenden Aussagen zu KMU und Unternehmensgröße ist/sind korrekt?",
  statements:[
    { text:"Rund 99 % der Unternehmen in der EU und in Österreich sind KMU.", correct:true,
      explain:"Richtig. KMU dominieren die Unternehmenslandschaft sowohl in der EU als auch in Österreich." },
    { text:"Rund zwei Drittel der Erwerbstätigen arbeiten in KMU.", correct:true,
      explain:"Richtig. KMU sind wichtige Arbeitgeber und tragen wesentlich zur Wertschöpfung bei." },
    { text:"Ein Kleinstunternehmen hat laut EU-Definition bis zu 49 Mitarbeiter:innen.", correct:false,
      explain:"Falsch. Ein Kleinstunternehmen hat bis zu 9 Mitarbeiter:innen; bis 49 spricht man von einem kleinen Unternehmen." },
    { text:"Die KMU-Definition stützt sich u. a. auf die Mitarbeiterzahl sowie Umsatz bzw. Bilanzsumme.", correct:true,
      explain:"Richtig. Neben der Beschäftigtenzahl sind auch finanzielle Schwellenwerte maßgeblich." },
    { text:"Großunternehmen beginnen ab 250 Mitarbeiter:innen.", correct:true,
      explain:"Richtig. Mittlere Unternehmen reichen bis 249 Mitarbeiter:innen, ab 250 spricht man von Großunternehmen." }
  ]
},

{ id:"u7", topic:"unternehmen", difficulty:"mittel",
  title:"Das Einzelunternehmen",
  stem:"Welche der folgenden Aussagen zum Einzelunternehmen ist/sind korrekt?",
  statements:[
    { text:"Beim Einzelunternehmen trägt eine Person die Entscheidungen und das unternehmerische Risiko.", correct:true,
      explain:"Richtig. Eine einzelne Person führt das Unternehmen und trägt das Risiko allein." },
    { text:"Der Einzelunternehmer haftet ausschließlich mit dem betrieblichen Vermögen.", correct:false,
      explain:"Falsch. Die Haftung ist unbeschränkt und umfasst auch das Privatvermögen." },
    { text:"Einzelunternehmen sind relativ einfach und ohne gesetzliches Mindestkapital zu gründen.", correct:true,
      explain:"Richtig. Es gibt kein gesetzliches Mindestkapital, das Kapital bringt der Unternehmer meist allein auf." },
    { text:"Eine gescheiterte Selbstständigkeit ist ein häufiger Grund für einen Privatkonkurs.", correct:true,
      explain:"Richtig. Wegen der unbeschränkten Haftung kann das Scheitern auch private finanzielle Schwierigkeiten nach sich ziehen." },
    { text:"Rund 85 % der Unternehmen in Österreich sind Einzelunternehmen.", correct:true,
      explain:"Richtig. Etwa jedes zehnte Unternehmen ist eine GmbH, gefolgt von je rund 2 % OG und KG." }
  ]
},

{ id:"u8", topic:"unternehmen", difficulty:"schwer",
  title:"Die Offene Gesellschaft (OG)",
  stem:"Welche der folgenden Aussagen zur Offenen Gesellschaft ist/sind korrekt?",
  statements:[
    { text:"Eine OG wird von mindestens zwei Gesellschafter:innen gegründet.", correct:true,
      explain:"Richtig. Die OG benötigt mindestens zwei Gesellschafter:innen." },
    { text:"In der OG gibt es zwei verschiedene Arten von Gesellschafter:innen.", correct:false,
      explain:"Falsch. Die OG kennt nur EINE Art von Gesellschafter:innen. Zwei Arten (Komplementär/Kommanditist) gibt es bei der KG." },
    { text:"Alle OG-Gesellschafter:innen sind zur Geschäftsführung berechtigt und verpflichtet.", correct:true,
      explain:"Richtig. In der OG führen grundsätzlich alle Gesellschafter:innen die Geschäfte." },
    { text:"Für die OG gibt es ein gesetzliches Mindestkapital von 10.000 Euro.", correct:false,
      explain:"Falsch. Für die OG gibt es – wie beim Einzelunternehmen – kein gesetzliches Mindestkapital." },
    { text:"OG-Gesellschafter:innen haften solidarisch mit dem gesamten Privatvermögen für den Gesamtbetrag der Schulden.", correct:true,
      explain:"Richtig. Die Haftung ist persönlich, unbeschränkt und solidarisch." }
  ]
},

{ id:"u9", topic:"unternehmen", difficulty:"schwer",
  title:"Die Kommanditgesellschaft (KG)",
  stem:"Welche der folgenden Aussagen zur Kommanditgesellschaft ist/sind korrekt?",
  statements:[
    { text:"In der KG gibt es Komplementäre und Kommanditisten.", correct:true,
      explain:"Richtig. Die KG unterscheidet zwischen diesen beiden Gesellschaftertypen." },
    { text:"Der Kommanditist haftet unbeschränkt mit seinem gesamten Privatvermögen.", correct:false,
      explain:"Falsch. Der Kommanditist haftet nur bis zur Höhe seiner Einlage." },
    { text:"Der Komplementär ist im Hinblick auf Mitarbeit und Haftung mit einem OG-Gesellschafter vergleichbar.", correct:true,
      explain:"Richtig. Er führt die Geschäfte und haftet unbeschränkt." },
    { text:"Kommanditisten haben Kontrollrechte und dürfen in die Bücher der Gesellschaft Einsicht nehmen.", correct:true,
      explain:"Richtig. Trotz beschränkter Haftung und fehlender Mitarbeit stehen ihnen Kontrollrechte zu." },
    { text:"Eine KG benötigt mindestens zwei Komplementäre.", correct:false,
      explain:"Falsch. Es genügt mindestens ein Komplementär – daneben mindestens ein Kommanditist." }
  ]
},

{ id:"u10", topic:"unternehmen", difficulty:"schwer",
  title:"Die GmbH",
  stem:"Welche der folgenden Aussagen zur Gesellschaft mit beschränkter Haftung ist/sind korrekt?",
  statements:[
    { text:"Das Mindeststammkapital der GmbH beträgt seit 1.1.2024 10.000 Euro.", correct:true,
      explain:"Richtig. Davor lag es bei 35.000 Euro." },
    { text:"Jede einzelne Stammeinlage muss mindestens 70 Euro betragen.", correct:true,
      explain:"Richtig. Bei der GmbH beträgt die Mindeststammeinlage 70 Euro (bei der FlexKapG nur 1 Euro)." },
    { text:"Das gesamte Stammkapital muss zwingend in bar geleistet werden.", correct:false,
      explain:"Falsch. Mindestens die Hälfte ist in Geld aufzubringen, der Rest kann eine Sacheinlage (z. B. Computer, Auto) sein." },
    { text:"Eine GmbH benötigt mindestens zwei Gesellschafter:innen.", correct:false,
      explain:"Falsch. Es muss zumindest einen Gesellschafter geben – eine Ein-Personen-GmbH ist möglich." },
    { text:"Die GmbH ist eine juristische Person mit eigener Rechtspersönlichkeit.", correct:true,
      explain:"Richtig. Als Kapitalgesellschaft kann sie selbst Verträge schließen, klagen und geklagt werden." }
  ]
},

{ id:"u11", topic:"unternehmen", difficulty:"schwer",
  title:"Die Flexible Kapitalgesellschaft (FlexKapG)",
  stem:"Welche der folgenden Aussagen zur FlexKapG ist/sind korrekt?",
  statements:[
    { text:"Bei der FlexKapG beträgt das Stammkapital ebenfalls 10.000 Euro.", correct:true,
      explain:"Richtig. Wie bei der GmbH liegt das Stammkapital bei 10.000 Euro." },

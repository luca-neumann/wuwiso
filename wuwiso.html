];

</script>
<script>
/* ============================================================
   WU Wien – Aufnahmeprüfung Wirtschaft – Prüfungssimulation
   App-Logik. Format: Multiple-True-False mit Negativbewertung.
   ============================================================ */

const POINTS_PER_Q = 4;
const LETTERS = ["A","B","C","D","E","F"];

const state = {
  screen: "start",
  mode: "exam",          // "exam" (Feedback am Ende) | "practice" (sofort)
  count: 20,
  topicFilter: "all",
  timed: false,
  timeLimitSec: 0,
  questions: [],         // selected & shuffled
  answers: {},           // qid -> Set of checked statement indices
  graded: {},            // qid -> true (in practice mode, once submitted)
  current: 0,
  startTs: 0,
  timerId: null
};

/* ---------- utilities ---------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function el(html){
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstChild;
}
function esc(s){
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function fmtPts(n){
  // round to 2 decimals, trim trailing zeros
  const r = Math.round(n*100)/100;
  return (r>0?"+":"") + (Number.isInteger(r)? r : r.toFixed(2).replace(/0$/,'').replace(/\.$/,''));
}

/* ---------- scoring (WU style) ---------- */
function scoreQuestion(q, checkedSet){
  const nTrue  = q.statements.filter(s=>s.correct).length;
  const nFalse = q.statements.length - nTrue;
  const posPer = nTrue  > 0 ? POINTS_PER_Q / nTrue  : 0;
  const negPer = nFalse > 0 ? POINTS_PER_Q / nFalse : 0;
  let raw = 0;
  const perStatement = q.statements.map((s, i) => {
    const checked = checkedSet.has(i);
    let pts = 0, kind = "neutral";
    if(checked && s.correct){ pts = posPer;  kind = "hit"; }     // +
    else if(checked && !s.correct){ pts = -negPer; kind = "wrong"; } // -
    else if(!checked && s.correct){ pts = 0; kind = "miss"; }    // missed
    else { pts = 0; kind = "ok"; }                               // correctly left
    raw += pts;
    return { i, checked, correct:s.correct, pts, kind, posPer, negPer };
  });
  const score = Math.max(0, raw);   // floored at 0 per question
  return { score, raw, perStatement, posPer, negPer, max: POINTS_PER_Q };
}

/* ---------- build a quiz ---------- */
function buildQuiz(){
  let pool = QUESTION_POOL.slice();
  if(state.topicFilter !== "all"){
    pool = pool.filter(q => q.topic === state.topicFilter);
  }
  pool = shuffle(pool);
  const n = Math.min(state.count, pool.length);
  // For each chosen question, shuffle statement order (keeping correctness)
  state.questions = pool.slice(0, n).map(q => {
    const order = shuffle(q.statements.map((_,i)=>i));
    return {
      ...q,
      statements: order.map(i => q.statements[i])
    };
  });
  state.answers = {};
  state.graded = {};
  state.current = 0;
}

/* ============================================================
   RENDER: START
   ============================================================ */
function renderStart(){
  const app = document.getElementById("view");
  const topicOpts = Object.entries(TOPICS).map(([k,v]) =>
    `<button class="choice-card topic-pick${state.topicFilter===k?' active':''}" data-topic="${k}">
       <div class="t">${esc(v.short)}</div><div class="d">${esc(v.label)}</div>
     </button>`).join("");

  const today = new Date().toLocaleDateString("de-AT", {year:"numeric",month:"2-digit",day:"2-digit"});

  app.innerHTML = `
  <div class="sheet">
    <span class="tab-corner">Prüfungsbogen</span>
    <p class="cover-sub" style="margin-top:4px;font-family:var(--f-mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);">Aufnahmeverfahren · Wirtschafts- und Sozialwissenschaften</p>
    <h1 class="cover-title">Wirtschaft verstehen — Testsimulation</h1>
    <p class="cover-sub">Eine prüfungsnahe Simulation des Wirtschaftsteils im Stil der WU-Aufnahmeprüfung. Jede Aufgabe besteht aus fünf Aussagen (A–E), die einzeln als richtig oder falsch zu bewerten sind. <strong>Achtung: Negativbewertung</strong> — wie im echten Test bringt jede richtig angekreuzte Aussage Punkte, jede falsch angekreuzte Aussage zieht Punkte ab.</p>

    <div class="cover-fields">
      <div><span class="k">Fachbereich</span><span class="v">Wirtschaft (BW &amp; VW)</span></div>
      <div><span class="k">Format</span><span class="v">Multiple-True-False</span></div>
      <div><span class="k">Punkte / Aufgabe</span><span class="v">4,00</span></div>
      <div><span class="k">Datum</span><span class="v">${esc(today)}</span></div>
    </div>

    <div class="option-block">
      <span class="label">1 · Themenbereich</span>
      <div class="choice-grid">
        <button class="choice-card topic-pick${state.topicFilter==='all'?' active':''}" data-topic="all">
          <div class="t">Gemischt</div><div class="d">Alle Themen kombiniert</div>
        </button>
        ${topicOpts}
      </div>
    </div>

    <div class="option-block">
      <span class="label">2 · Anzahl der Aufgaben</span>
      <div class="choice-grid" id="count-grid">
        ${[10,20,40,100].map(c=>`<button class="choice-card count-pick${state.count===c?' active':''}" data-count="${c}">
            <div class="t">${c===100?'Alle':c+' Aufgaben'}</div>
            <div class="d">${c===100?'gesamter Pool (400 P.)':'= '+(c*4)+' Punkte'}</div>
          </button>`).join("")}
      </div>
    </div>

    <div class="option-block">
      <span class="label">3 · Modus</span>
      <div class="choice-grid">
        <button class="choice-card mode-pick${state.mode==='exam'?' active':''}" data-mode="exam">
          <div class="t">Prüfungsmodus</div><div class="d">Auswertung erst am Ende</div>
        </button>
        <button class="choice-card mode-pick${state.mode==='practice'?' active':''}" data-mode="practice">
          <div class="t">Übungsmodus</div><div class="d">Sofortiges Feedback je Aufgabe</div>
        </button>
      </div>
    </div>

    <div class="option-block">
      <span class="label">4 · Timer (optional)</span>
      <div class="choice-grid">
        <button class="choice-card timer-pick${!state.timed?' active':''}" data-timed="0">
          <div class="t">Ohne Zeitlimit</div><div class="d">In eigenem Tempo</div>
        </button>
        <button class="choice-card timer-pick${state.timed?' active':''}" data-timed="1">
          <div class="t">Mit Zeitlimit</div><div class="d">90 Sekunden je Aufgabe</div>
        </button>
      </div>
    </div>

    <div class="start-actions">
      <span class="start-note" id="start-note"></span>
      <button class="btn" id="start-btn">Prüfung starten →</button>
    </div>
  </div>`;

  // wire pickers
  app.querySelectorAll(".topic-pick").forEach(b => b.onclick = () => {
    state.topicFilter = b.dataset.topic; refreshStartActiveAndNote();
  });
  app.querySelectorAll(".count-pick").forEach(b => b.onclick = () => {
    state.count = +b.dataset.count; refreshStartActiveAndNote();
  });
  app.querySelectorAll(".mode-pick").forEach(b => b.onclick = () => {
    state.mode = b.dataset.mode; setActive(".mode-pick", b);
  });
  app.querySelectorAll(".timer-pick").forEach(b => b.onclick = () => {
    state.timed = b.dataset.timed === "1"; setActive(".timer-pick", b);
  });
  document.getElementById("start-btn").onclick = startQuiz;
  refreshStartActiveAndNote();

  function setActive(sel, btn){
    app.querySelectorAll(sel).forEach(x=>x.classList.remove("active"));
    btn.classList.add("active");
  }
  function refreshStartActiveAndNote(){
    setActive(".topic-pick", app.querySelector(`.topic-pick[data-topic="${state.topicFilter}"]`));
    // recompute available count
    const avail = state.topicFilter==="all" ? QUESTION_POOL.length
      : QUESTION_POOL.filter(q=>q.topic===state.topicFilter).length;
    app.querySelectorAll(".count-pick").forEach(b=>{
      const c=+b.dataset.count;
      b.classList.toggle("active", state.count===c);
    });
    const eff = Math.min(state.count, avail);
    document.getElementById("start-note").textContent =
      `${eff} Aufgaben · max. ${eff*4} Punkte`;
  }
}

/* ============================================================
   START / TIMER
   ============================================================ */
function startQuiz(){
  buildQuiz();
  state.screen = "quiz";
  state.startTs = Date.now();
  if(state.timed){
    state.timeLimitSec = state.questions.length * 90;
    startTimer();
  }
  renderQuiz();
}

function startTimer(){
  stopTimer();
  state.timerId = setInterval(() => {
    const elapsed = Math.floor((Date.now()-state.startTs)/1000);
    const remain = state.timeLimitSec - elapsed;
    const pill = document.getElementById("timer");
    if(pill){
      const m = Math.floor(Math.max(0,remain)/60), s = Math.max(0,remain)%60;
      pill.textContent = `⏱ ${m}:${String(s).padStart(2,"0")}`;
      pill.classList.toggle("low", remain <= 60);
    }
    if(remain <= 0){ stopTimer(); finishQuiz(true); }
  }, 1000);
}
function stopTimer(){ if(state.timerId){ clearInterval(state.timerId); state.timerId=null; } }

/* ============================================================
   RENDER: QUIZ
   ============================================================ */
function renderQuiz(){
  const q = state.questions[state.current];
  const idx = state.current;
  const totalQ = state.questions.length;
  const checked = state.answers[q.id] || new Set();
  const isGraded = state.mode==="practice" && state.graded[q.id];

  const app = document.getElementById("view");
  const pct = Math.round((idx) / totalQ * 100);

  const diffTag = `<span class="tag diff-${q.difficulty}">${q.difficulty}</span>`;
  const topicTag = `<span class="tag">${esc(TOPICS[q.topic].short)}</span>`;
  const caseTag = q.scenario ? `<span class="tag type-case">Fallbeispiel</span>` : "";
  const bilanzTag = q.bilanz ? `<span class="tag type-calc">Bilanz</span>` : "";

  const scenarioHtml = q.scenario ? `
    <div class="scenario-box">
      <span class="sc-label">Ausgangssituation</span>
      ${q.scenario.split("\n").filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")}
    </div>` : "";

  const bilanzHtml = q.bilanz ? renderBilanz(q.bilanz) : "";

  // statements
  const stmtRows = q.statements.map((s, i) => {
    const on = checked.has(i);
    let cls = "stmt", extra = "", pts = "";
    if(isGraded){
      const sc = scoreQuestion(q, checked).perStatement[i];
      cls += " row-graded";
      if(sc.kind==="hit")  { cls+=" g-hit";   pts = `<div class="pts pos">${fmtPts(sc.pts)}</div>`; }
      if(sc.kind==="wrong"){ cls+=" g-wrong"; pts = `<div class="pts neg">${fmtPts(sc.pts)}</div>`; }
      if(sc.kind==="miss") { cls+=" g-miss";  pts = `<div class="pts">0</div>`; }
      if(sc.kind==="ok")   { cls+=" g-ok";    pts = `<div class="pts">0</div>`; }
      extra = `<div class="stmt-expl">
                 <span class="${s.correct?'v':'x'}">${s.correct?'Richtig':'Falsch'} · </span>${esc(s.explain)}
               </div>`;
    }
    return `<div class="${cls}${on?' checked':''}" data-i="${i}" ${isGraded?'aria-disabled="true"':'role="checkbox" tabindex="0" aria-checked="'+on+'"'}>
      <div class="letter">${LETTERS[i]}</div>
      <div class="body">${esc(s.text)}</div>
      <div class="check"><span class="box"></span></div>
      ${pts}
      ${extra}
    </div>`;
  }).join("");

  // footer / nav
  let footerRight = "";
  if(state.mode==="practice" && !isGraded){
    footerRight = `<button class="btn" id="grade-btn">Aufgabe prüfen</button>`;
  } else {
    const isLast = idx === totalQ-1;
    footerRight = `<button class="btn" id="next-btn">${isLast?'Auswertung anzeigen →':'Weiter →'}</button>`;
  }

  // graded score line (practice)
  let scoreLine = "";
  if(isGraded){
    const sc = scoreQuestion(q, checked);
    const cls = sc.score===sc.max ? "full" : (sc.score===0 ? "zero" : "part");
    scoreLine = `<div class="q-scoreline">
        <span class="lbl">Aufgabenbewertung</span>
        <span class="val ${cls}">${fmtPts(sc.score).replace('+','')} / ${sc.max} Punkte</span>
      </div>`;
  }

  app.innerHTML = `
    <div class="quiz-header">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span>Aufgabe ${idx+1} / ${totalQ}</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${Math.round((idx+ (isGraded?1:0))/totalQ*100)}%"></div></div>
      </div>
      ${state.timed ? `<div class="timer-pill" id="timer">⏱ --:--</div>` : ``}
    </div>

    <div class="sheet sheet--plain">
      <span class="tab-corner">Max. 4 Punkte</span>
      <div class="tagrow">${topicTag}${diffTag}${caseTag}${bilanzTag}</div>
      ${q.title ? `<div class="q-number">Aufgabe ${idx+1}${q.title?' · '+esc(q.title):''}</div>` : ``}
      ${scenarioHtml}
      ${bilanzHtml}
      <p class="q-text">${esc(q.stem)}</p>
      <p class="q-hint">Mehrfachauswahl — kreuzen Sie alle zutreffenden Aussagen an. Richtige Auswahl bringt Punkte, falsche Auswahl zieht Punkte ab.</p>
      <div class="stmt-list">${stmtRows}</div>
      ${scoreLine}
    </div>

    <div class="quiz-footer">
      ${idx>0 ? `<button class="btn btn--ghost" id="prev-btn">← Zurück</button>` : `<span></span>`}
      <span class="spacer"></span>
      <button class="btn btn--ghost" id="abort-btn">Beenden</button>
      ${footerRight}
    </div>`;

  // restart timer display
  if(state.timed) startTimer();

  // wire statements (only if not graded)
  if(!isGraded){
    app.querySelectorAll(".stmt").forEach(row => {
      const toggle = () => {
        const i = +row.dataset.i;
        if(!state.answers[q.id]) state.answers[q.id] = new Set();
        const set = state.answers[q.id];
        if(set.has(i)){ set.delete(i); row.classList.remove("checked"); row.setAttribute("aria-checked","false"); }
        else { set.add(i); row.classList.add("checked"); row.setAttribute("aria-checked","true"); }
      };
      row.onclick = toggle;
      row.onkeydown = (e) => { if(e.key===" "||e.key==="Enter"){ e.preventDefault(); toggle(); } };
    });
  }

  // wire nav
  const prev = document.getElementById("prev-btn");
  if(prev) prev.onclick = () => { state.current--; renderQuiz(); window.scrollTo(0,0); };

  const grade = document.getElementById("grade-btn");
  if(grade) grade.onclick = () => { state.graded[q.id] = true; renderQuiz(); };

  const next = document.getElementById("next-btn");
  if(next) next.onclick = () => {
    if(state.current === totalQ-1){ finishQuiz(false); }
    else { state.current++; renderQuiz(); window.scrollTo(0,0); }
  };

  document.getElementById("abort-btn").onclick = () => {
    if(confirm("Prüfung wirklich beenden? Der bisherige Fortschritt wird ausgewertet.")) finishQuiz(false);
  };

  updateFileNo();
}

function renderBilanz(b){
  const rows = Math.max(b.aktiva.length, b.passiva.length);
  let body = "";
  for(let i=0;i<rows;i++){
    const a = b.aktiva[i], p = b.passiva[i];
    body += `
      <div class="${a&&a.head?'grp':''}">${a?esc(a.name):""}</div>
      <div class="amt ${a&&a.head?'grp':''}">${a&&a.value?esc(a.value):""}</div>
      <div class="${p&&p.head?'grp':''} col-sep">${p?esc(p.name):""}</div>
      <div class="amt ${p&&p.head?'grp':''}">${p&&p.value?esc(p.value):""}</div>`;
  }
  return `
  <div class="qbilanz">
    <div class="qbilanz-head">
      <div>Aktiva (Vermögen)</div><div class="amt">Betrag</div>
      <div class="col-sep">Passiva (Kapital)</div><div class="amt">Betrag</div>
    </div>
    <div class="qbilanz-body">${body}</div>
    <div class="qbilanz-foot">
      <div>Bilanzsumme</div><div class="amt">${esc(b.summe)}</div>
      <div class="col-sep">Bilanzsumme</div><div class="amt">${esc(b.summe)}</div>
    </div>
  </div>`;
}

/* ============================================================
   FINISH & RESULTS
   ============================================================ */
function finishQuiz(timedOut){
  stopTimer();
  state.screen = "results";
  renderResults(timedOut);
  window.scrollTo(0,0);
}

function renderResults(timedOut){
  const app = document.getElementById("view");

  // compute scores
  let totalScore = 0, maxScore = 0;
  const perTopic = {};   // topic -> {score,max}
  const reviews = [];

  state.questions.forEach(q => {
    const checked = state.answers[q.id] || new Set();
    const sc = scoreQuestion(q, checked);
    totalScore += sc.score; maxScore += sc.max;
    if(!perTopic[q.topic]) perTopic[q.topic] = {score:0,max:0};
    perTopic[q.topic].score += sc.score;
    perTopic[q.topic].max += sc.max;
    reviews.push({ q, sc, checked });
  });

  const pct = maxScore>0 ? Math.round(totalScore/maxScore*100) : 0;
  const scoreRounded = Math.round(totalScore*100)/100;

  // headline
  let head, msg;
  if(pct>=80){ head="Ausgezeichnet"; msg="Sie beherrschen den Stoff sehr sicher und treffen auch bei kniffligen Aussagen die richtige Entscheidung."; }
  else if(pct>=60){ head="Solide Leistung"; msg="Ein gutes Ergebnis. Mit etwas Feinschliff bei einzelnen Themen ist noch mehr drin."; }
  else if(pct>=40){ head="Auf gutem Weg"; msg="Die Grundlagen sitzen teilweise. Konzentrieren Sie sich auf die unten markierten Schwächen."; }
  else { head="Noch Luft nach oben"; msg="Hier lohnt sich gezieltes Wiederholen. Die Themenauswertung zeigt, wo Sie ansetzen sollten."; }

  // sort topics by performance for "balance sheet" (strengths = aktiva, weaknesses = passiva)
  const topicRows = Object.entries(perTopic).map(([k,v]) => ({
    key:k, label:TOPICS[k].short, pct: v.max>0?Math.round(v.score/v.max*100):0, score:v.score, max:v.max
  }));
  const strengths = topicRows.filter(t=>t.pct>=60).sort((a,b)=>b.pct-a.pct);
  const weaknesses = topicRows.filter(t=>t.pct<60).sort((a,b)=>a.pct-b.pct);

  const balRow = t => `<div class="balance-row"><span class="name">${esc(t.label)}</span><span class="pct">${t.pct}% (${fmtPts(t.score).replace('+','')}/${t.max})</span></div>`;

  const aktivaHtml = strengths.length ? strengths.map(balRow).join("")
    : `<div class="balance-empty">Noch keine Themen über 60 % — hier ist Potenzial.</div>`;
  const passivaHtml = weaknesses.length ? weaknesses.map(balRow).join("")
    : `<div class="balance-empty">Keine ausgeprägten Schwächen — gut gemacht!</div>`;

  // tips from weakest topics
  const tipBank = {
    grundlagen: "Wiederholen Sie Markt- und Wettbewerbsformen (Monopol/Oligopol/Polypol vs. Monopson), Angebot/Nachfrage, BIP vs. BNP sowie die Ursachen der Inflation.",
    nachhaltigkeit: "Schärfen Sie den Unterschied zwischen schwacher und starker Nachhaltigkeit und merken Sie sich: 7 von 9 planetaren Grenzen sind überschritten.",
    unternehmen: "Üben Sie die Haftung je Rechtsform und die Mindestkapital-Beträge: GmbH 10.000 €, AG 70.000 €, SE 120.000 €.",
    finanzierung: "Trennen Sie sauber Eigen-/Fremdkapital und Innen-/Außenfinanzierung; Aktie = Anteilsrecht, Anleihe = Forderungsrecht.",
    rechnungswesen: "Trainieren Sie die Bilanzlogik (Aktiva = Passiva), Deckungsbeitrag und Break-Even sowie den Unterschied Gewinn ↔ Cashflow.",
    marketing: "Festigen Sie die 4 Ps, Markt­anteil (absolut/relativ), den Produktlebenszyklus und die Käuferverhaltens-Effekte (Snob/Mitläufer/Qualität).",
    digitalisierung: "Merken Sie sich: Internet = Netz von Netzen, WWW = Dienst darauf; HTTP/HTML/URL und das Request-Response-Prinzip."
  };
  const tipList = (weaknesses.length?weaknesses:topicRows.sort((a,b)=>a.pct-b.pct).slice(0,2))
    .map(t=>`<li><strong>${esc(t.label)} (${t.pct}%):</strong> ${esc(tipBank[t.key]||"")}</li>`).join("");

  // review items
  const reviewHtml = reviews.map((r, idx) => {
    const cls = r.sc.score===r.sc.max ? "ok" : (r.sc.score===0 ? "bad" : "");
    const badge = r.sc.score===r.sc.max
      ? `<span class="badge-result ok">${fmtPts(r.sc.score).replace('+','')}/4</span>`
      : `<span class="badge-result ${r.sc.score===0?'bad':'ok'}">${fmtPts(r.sc.score).replace('+','')}/4</span>`;
    const stmts = r.q.statements.map((s,i)=>{
      const c = r.checked.has(i);
      const sym = s.correct
        ? (c?'✓ richtig erkannt':'– übersehen (war richtig)')
        : (c?'✗ falsch angekreuzt':'✓ korrekt nicht gewählt');
      const col = s.correct ? (c?'var(--green)':'var(--amber)') : (c?'var(--red)':'var(--ink-faint)');
      return `<div style="display:flex;gap:8px;margin:4px 0;font-size:.82rem;">
                <span style="font-family:var(--f-mono);color:var(--ink-faint);flex-shrink:0;">${LETTERS[i]}</span>
                <span style="flex:1;color:var(--ink-soft);">${esc(s.text)}</span>
                <span style="flex-shrink:0;color:${col};font-family:var(--f-mono);font-size:.72rem;white-space:nowrap;">${sym}</span>
              </div>`;
    }).join("");
    return `<div class="review-item">
      <div class="rh">
        <div>
          <div class="q-number">Aufgabe ${idx+1} · ${esc(TOPICS[r.q.topic].short)}${r.q.title?' · '+esc(r.q.title):''}</div>
          <div class="rq">${esc(r.q.stem)}</div>
        </div>
        ${badge}
      </div>
      ${stmts}
    </div>`;
  }).join("");

  const elapsed = Math.floor((Date.now()-state.startTs)/1000);
  const em = Math.floor(elapsed/60), es = elapsed%60;

  app.innerHTML = `
    <div class="sheet">
      <span class="tab-corner">Auswertung</span>
      ${timedOut?`<p class="cover-sub" style="color:var(--red);font-weight:600;">⏱ Zeit abgelaufen — die Prüfung wurde automatisch abgegeben.</p>`:""}
      <div class="score-hero">
        <div class="score-circle">
          <span class="num">${pct}<span style="font-size:1.1rem;">%</span></span>
          <span class="pct">${fmtPts(scoreRounded).replace('+','')} / ${maxScore} Pkt</span>
        </div>
        <div class="score-headline">
          <h2>${esc(head)}</h2>
          <p>${esc(msg)}</p>
          <p style="font-family:var(--f-mono);font-size:.75rem;color:var(--ink-faint);margin-top:8px;">
            ${state.questions.length} Aufgaben · Bearbeitungszeit ${em}:${String(es).padStart(2,"0")} min
          </p>
        </div>
      </div>

      <div class="balance-title">Themen-Bilanz</div>
      <div class="balance-sheet">
        <div class="balance-col">
          <div class="balance-head aktiva">Stärken (≥ 60 %)</div>
          ${aktivaHtml}
        </div>
        <div class="balance-col">
          <div class="balance-head passiva">Aufholbedarf (&lt; 60 %)</div>
          ${passivaHtml}
        </div>
        <div class="balance-foot">
          <span>Gesamtergebnis</span>
          <span>${fmtPts(scoreRounded).replace('+','')} / ${maxScore} Punkte · ${pct}%</span>
        </div>
      </div>

      <div class="tips">
        <h3>Empfehlungen zur Vertiefung</h3>
        <ul>${tipList}</ul>
      </div>

      <details class="review-toggle">
        <summary>Aufgabenübersicht anzeigen (${state.questions.length} Aufgaben)</summary>
        <div class="review-list" style="margin-top:14px;">${reviewHtml}</div>
      </details>

      <div class="start-actions" style="margin-top:26px;">
        <button class="btn btn--ghost" id="again-same">Neue Aufgaben, gleiche Einstellungen</button>
        <button class="btn" id="restart">Zur Startseite</button>
      </div>
    </div>`;

  document.getElementById("restart").onclick = () => { state.screen="start"; renderStart(); window.scrollTo(0,0); };
  document.getElementById("again-same").onclick = () => { startQuiz(); window.scrollTo(0,0); };
  updateFileNo();
}

/* ---------- file number in masthead ---------- */
function updateFileNo(){
  const e = document.getElementById("file-no");
  if(!e) return;
  const total = QUESTION_POOL.length;
  if(state.screen==="quiz") e.textContent = `Bogen ${state.current+1}/${state.questions.length} · Pool ${total} Aufg.`;
  else if(state.screen==="results") e.textContent = `Auswertung · ${state.questions.length} Aufg.`;
  else e.textContent = `Pool: ${total} Aufgaben`;
}

/* ---------- boot ---------- */
document.addEventListener("DOMContentLoaded", () => {
  renderStart();
  updateFileNo();
});

</script>
</body>
</html>

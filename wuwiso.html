    { text:"Die Mindesthöhe einer einzelnen Stammeinlage beträgt bei der FlexKapG nur 1 Euro.", correct:true,
      explain:"Richtig. Das ist ein wesentlicher Unterschied zur GmbH (dort 70 Euro)." },
    { text:"Die FlexKapG sieht Unternehmenswert-Anteile vor, die eine einfache Mitarbeiterbeteiligung ermöglichen sollen.", correct:true,
      explain:"Richtig. Diese Sonderform des Stammkapitals soll die Beteiligung von Mitarbeiter:innen erleichtern." },
    { text:"Unternehmenswert-Beteiligte haben volles Stimmrecht in der Gesellschafterversammlung.", correct:false,
      explain:"Falsch. Sie haben Anspruch auf ihren Gewinnanteil, verfügen aber über kein Stimmrecht." },
    { text:"Schon ein einziger Gesellschafter genügt zur Gründung einer FlexKapG.", correct:true,
      explain:"Richtig. Ebenso wie bei der GmbH reicht ein Gesellschafter." }
  ]
},

{ id:"u12", topic:"unternehmen", difficulty:"schwer",
  title:"Aktiengesellschaft und SE",
  stem:"Welche der folgenden Aussagen zur AG und zur Europäischen Gesellschaft (SE) ist/sind korrekt?",
  statements:[
    { text:"Das Mindestgrundkapital einer AG beträgt 70.000 Euro.", correct:true,
      explain:"Richtig. Das Grundkapital wird in Aktien aufgeteilt." },
    { text:"Aktionäre haften persönlich mit ihrem Privatvermögen für die Schulden der AG.", correct:false,
      explain:"Falsch. Aktionäre haften nicht persönlich; sie riskieren nur das in den Aktienkauf investierte Kapital." },
    { text:"Der Vorstand führt die Geschäfte und wird vom Aufsichtsrat bestellt und abberufen.", correct:true,
      explain:"Richtig. Der Vorstand handelt in eigener Verantwortung und vertritt die Gesellschaft." },
    { text:"Die Societas Europaea (SE) hat ein Mindestkapital von 120.000 Euro.", correct:true,
      explain:"Richtig. Die SE ist eine Variante der AG mit einheitlichem EU-/EWR-weitem Rechtsrahmen." },
    { text:"Im Firmenbuch werden die Namen der einzelnen Aktionäre einer AG eingetragen.", correct:false,
      explain:"Falsch. Die Aktionäre einer AG werden im Firmenbuch gerade NICHT eingetragen (anders als die Gesellschafter anderer Rechtsformen)." }
  ]
},

{ id:"u13", topic:"unternehmen", difficulty:"schwer",
  title:"Die Genossenschaft",
  stem:"Welche der folgenden Aussagen zur Genossenschaft ist/sind korrekt?",
  statements:[
    { text:"Im Vordergrund der Genossenschaft steht die Förderung des Erwerbs und der Wirtschaft ihrer Mitglieder.", correct:true,
      explain:"Richtig. Nicht die Gewinnmaximierung, sondern das gemeinsame Wirtschaften steht im Mittelpunkt." },
    { text:"Genossenschaften benötigen ein gesetzliches Mindestkapital von 35.000 Euro.", correct:false,
      explain:"Falsch. Für Genossenschaften ist kein Mindestkapital notwendig; die Mitglieder beteiligen sich mit einer Einlage." },
    { text:"Bei einer Genossenschaft gilt grundsätzlich das Kopfstimmrecht.", correct:true,
      explain:"Richtig. Jedes Mitglied hat unabhängig vom Kapitalanteil eine Stimme; die Satzung kann abweichen." },
    { text:"Gewinne werden reinvestiert oder als Rückvergütungen an die Mitglieder ausgezahlt.", correct:true,
      explain:"Richtig. So profitieren die Mitglieder vom gemeinsamen Wirtschaften." },
    { text:"Der Ein- und Austritt aus einer Genossenschaft ist sehr schwierig und unflexibel.", correct:false,
      explain:"Falsch. Ein- und Austritt sind einfach; die Mitgliederzahl ist leicht veränderlich." }
  ]
},

{ id:"u14", topic:"unternehmen", difficulty:"mittel",
  title:"Kapitalgesellschaften allgemein",
  stem:"Welche der folgenden Aussagen zu Kapitalgesellschaften ist/sind korrekt?",
  statements:[
    { text:"Kapitalgesellschaften besitzen eine eigene Rechtspersönlichkeit und gelten als juristische Personen.", correct:true,
      explain:"Richtig. Im Gegensatz zu natürlichen Personen brauchen sie aber Menschen, die für sie handeln." },
    { text:"Bei Kapitalgesellschaften können Kapitalaufbringung und Geschäftsführung getrennt sein.", correct:true,
      explain:"Richtig. Gesellschafter:innen stellen Kapital bereit, müssen aber nicht selbst die Geschäfte führen." },
    { text:"Gesellschafter:innen von Kapitalgesellschaften müssen zwingend im Unternehmen mitarbeiten.", correct:false,
      explain:"Falsch. Sie müssen nicht notwendigerweise mitarbeiten – das ist gerade ein Kennzeichen der Kapitalgesellschaft." },
    { text:"Das Gesetz schreibt für Kapitalgesellschaften eine Mindestkapitalhöhe vor.", correct:true,
      explain:"Richtig. Z. B. GmbH 10.000 Euro, AG 70.000 Euro." },
    { text:"Eine juristische Person kann selbst keine Verträge abschließen oder klagen.", correct:false,
      explain:"Falsch. Als juristische Person kann sie Geschäfte machen, Verträge schließen, klagen und geklagt werden." }
  ]
},

{ id:"u15", topic:"unternehmen", difficulty:"mittel",
  title:"Eintragung ins Firmenbuch",
  stem:"Welche der folgenden Aussagen zum Firmenbuch ist/sind korrekt?",
  statements:[
    { text:"OG, KG, GmbH, AG und Genossenschaften müssen ins Firmenbuch eingetragen werden.", correct:true,
      explain:"Richtig. Diese Rechtsformen sind unabhängig von ihrer Größe eintragungspflichtig." },
    { text:"Das Firmenbuch ist eine öffentliche, von Gerichten geführte Unternehmensdatenbank.", correct:true,
      explain:"Richtig. Die Einsichtnahme erhöht die Transparenz und kann Geschäftsabschlüsse fördern." },
    { text:"Ein Einzelunternehmen muss sich ab einem Umsatz von mehr als 700.000 Euro in zwei aufeinanderfolgenden Jahren eintragen lassen.", correct:true,
      explain:"Richtig. Alternativ greift die Pflicht ab mehr als 1 Mio. Euro Umsatz in einem Jahr." },
    { text:"Eine freiwillige Eintragung von Einzelunternehmen ist nicht möglich.", correct:false,
      explain:"Falsch. Eine freiwillige Eintragung ist möglich, etwa wegen der Transparenz gegenüber Geschäftspartnern." },
    { text:"Die Firmenbucheintragung enthält die Firma, den Sitz und den Unternehmensgegenstand.", correct:true,
      explain:"Richtig. Zusätzlich u. a. die Namen der Gesellschafter (nicht der Aktionäre) und wer die Geschäfte führen darf." }
  ]
},

{ id:"u16", topic:"unternehmen", difficulty:"schwer",
  title:"Rechtsformwahl und Haftungsvergleich",
  stem:"Welche der folgenden Aussagen zur Wahl der Rechtsform ist/sind korrekt?",
  statements:[
    { text:"Wer hohe Kapitalsummen aufbringen will, wählt eher eine Kapitalgesellschaft als eine Personengesellschaft.", correct:true,
      explain:"Richtig. Durch viele Gesellschafter:innen mit beschränkter Haftung lassen sich höhere Summen leichter aufbringen." },
    { text:"Bei der GmbH haften die Gesellschafter nur mit ihrer Stammeinlage.", correct:true,
      explain:"Richtig. Die Haftung ist auf die Einlage beschränkt." },
    { text:"Genossenschafter haften in der Regel mit ihrer Einlage in (üblicherweise) doppelter Höhe.", correct:true,
      explain:"Richtig. Beispiel: Bei einem Anteil von 100 Euro haftet das Mitglied mit weiteren 100 Euro – maximal 200 Euro." },
    { text:"Bei der OG haften die Gesellschafter nur bis zur Höhe ihrer Kapitaleinlage.", correct:false,
      explain:"Falsch. OG-Gesellschafter:innen haften unbeschränkt und solidarisch, nicht nur mit ihrer Einlage." },
    { text:"Personengesellschaften sind meist unabhängig von Bankkrediten, weil sie leicht hohe Kapitalsummen aufbringen.", correct:false,
      explain:"Falsch. Sie haben meist nur wenige Gesellschafter und sind daher oft von der Finanzierung durch Bankkredite abhängig." }
  ]
},

/* ===== FINANZIERUNG (Erweiterung) ===== */
{ id:"f5", topic:"finanzierung", difficulty:"mittel",
  title:"Eigenschaften des Eigenkapitals",
  stem:"Welche der folgenden Aussagen zum Eigenkapital ist/sind korrekt?",
  statements:[
    { text:"Eigenkapital muss in der Regel nicht zurückgezahlt werden.", correct:true,
      explain:"Richtig. Es steht meist unbefristet zur Verfügung und eignet sich für langfristige Investitionen." },
    { text:"Auch Sacheinlagen wie ein Lieferwagen oder PCs erhöhen das Eigenkapital.", correct:true,
      explain:"Richtig. Nicht nur Geld, sondern auch eingebrachte Sachwerte zählen zum Eigenkapital." },
    { text:"Für Eigenkapital müssen auch in Verlustjahren verpflichtend Zinsen gezahlt werden.", correct:false,
      explain:"Falsch. In Jahren ohne Gewinn fallen für Eigenkapital keine Zinsen an – anders als bei einem Kredit." },
    { text:"Verluste reduzieren das Eigenkapital.", correct:true,
      explain:"Richtig. Daher kann viel Eigenkapital helfen, Verlustjahre ohne Überschuldung zu überstehen." },
    { text:"Eigenkapital eignet sich kaum für langfristige Investitionen.", correct:false,
      explain:"Falsch. Gerade weil es langfristig (unbefristet) verfügbar ist, eignet es sich gut für langfristige Investitionen." }
  ]
},

{ id:"f6", topic:"finanzierung", difficulty:"schwer",
  title:"Fremdkapital und Lieferantenkredit",
  stem:"Welche der folgenden Aussagen zum Fremdkapital ist/sind korrekt?",
  statements:[
    { text:"Kredite sind die wesentlichste Form von Fremdkapital.", correct:true,
      explain:"Richtig. Langfristige Kredite gewähren v. a. Banken, kurzfristige auch Lieferant:innen." },
    { text:"Fremdkapital steht in der Regel unbefristet und ohne Rückzahlungspflicht zur Verfügung.", correct:false,
      explain:"Falsch. Fremdkapital steht meist nur befristet zur Verfügung, ist zu verzinsen und muss zurückgezahlt werden." },
    { text:"Wird 'auf Ziel' gekauft, finanziert der Lieferant das Unternehmen kurzfristig (Lieferverbindlichkeit).", correct:true,
      explain:"Richtig. Die spätere Zahlung ist eine kurzfristige Außenfinanzierung mit Fremdkapital." },
    { text:"Verzichtet man auf einen möglichen Skonto, zahlt man wirtschaftlich betrachtet für das Zahlungsziel Zinsen.", correct:true,
      explain:"Richtig. Der entgangene Skonto entspricht den Kosten für das Inanspruchnehmen des Zahlungsziels." },
    { text:"Die Effektivverzinsung eines nicht genutzten Skontos ist meist sehr niedrig.", correct:false,
      explain:"Falsch. Sie ist in den meisten Fällen sehr hoch, sodass eine kurzfristige Kontoüberziehung oft günstiger ist." }
  ]
},

{ id:"f7", topic:"finanzierung", difficulty:"schwer",
  title:"Innenfinanzierung und Selbstfinanzierung",
  stem:"Welche der folgenden Aussagen zur Innenfinanzierung ist/sind korrekt?",
  statements:[
    { text:"Stammt die Finanzierungsquelle aus dem Umsatz des Unternehmens, spricht man von Innenfinanzierung.", correct:true,
      explain:"Richtig. Die Selbstfinanzierung durch einbehaltene Gewinne ist deren wichtigste Form." },
    { text:"Selbstfinanzierung durch einbehaltene Gewinne erhöht das Eigenkapital.", correct:true,
      explain:"Richtig. Damit wird das Unternehmen krisenresistenter und wettbewerbsfähiger." },
    { text:"Selbstfinanzierung macht ein Unternehmen abhängiger von Fremdkapitalgebern.", correct:false,
      explain:"Falsch. Sie macht das Unternehmen WENIGER abhängig von Fremdkapitalgebern." },
    { text:"Viel Eigenkapital erlaubt es, mehrere Verlustjahre zu überstehen, ohne überschuldet zu sein.", correct:true,
      explain:"Richtig. Ist das Eigenkapital aufgebraucht und übersteigt das Fremdkapital das Vermögen, droht Überschuldung." },
    { text:"Selbstfinanzierung ist eine Form der Außenfinanzierung.", correct:false,
      explain:"Falsch. Selbstfinanzierung gehört zur Innenfinanzierung, weil die Mittel aus dem Umsatz stammen." }
  ]
},

{ id:"f8", topic:"finanzierung", difficulty:"schwer",
  title:"Abschreibungs- und Rückstellungsfinanzierung",
  stem:"Welche der folgenden Aussagen zu Abschreibungs- und Rückstellungsfinanzierung ist/sind korrekt?",
  statements:[
    { text:"Die Abschreibung stellt einen Aufwand, aber keine Auszahlung dar.", correct:true,
      explain:"Richtig. Der Wertverlust mindert den Gewinn, das Geld bleibt aber vorerst im Unternehmen." },
    { text:"'Verdiente' Abschreibungen stehen zwischenzeitlich für andere Investitionen zur Verfügung.", correct:true,
      explain:"Richtig. Werden die Abschreibungen über die Verkaufspreise verdient, entsteht ein Innenfinanzierungseffekt." },
    { text:"Die Bildung einer Rückstellung erhöht den Gewinn des Unternehmens.", correct:false,
      explain:"Falsch. Die Rückstellungsbildung ist ein Aufwand und VERRINGERT den Gewinn, ohne eine Auszahlung darzustellen." },
    { text:"Pensionsrückstellungen können einen langfristigen Finanzierungseffekt haben.", correct:true,
      explain:"Richtig. Da die Auszahlung erst in vielen Jahren erfolgt, stehen die Mittel lange zur Verfügung." },
    { text:"Rückstellungen werden für mögliche zukünftige Aufwände gebildet, etwa für Prozesse oder Abfertigungen.", correct:true,
      explain:"Richtig. Das Unternehmen sorgt damit für künftige, noch unsichere Aufwände vor." }
  ]
},

{ id:"f9", topic:"finanzierung", difficulty:"mittel",
  title:"Formen der Außenfinanzierung",
  stem:"Welche der folgenden Aussagen zur Außenfinanzierung ist/sind korrekt?",
  statements:[
    { text:"Bei der Außenfinanzierung liegt die Finanzierungsquelle außerhalb des Unternehmens.", correct:true,
      explain:"Richtig. Von außen können sowohl Eigen- als auch Fremdkapital zugeführt werden." },
    { text:"Von außen kann sowohl Eigen- als auch Fremdkapital zugeführt werden.", correct:true,
      explain:"Richtig. Beispiele sind neue Gesellschafter (Eigenkapital) oder Kredite (Fremdkapital)." },
    { text:"Die Aktienemission ist eine Form der Außenfinanzierung mit Eigenkapital.", correct:true,
      explain:"Richtig. Werden Aktien ausgegeben und gekauft, entsteht ein Eigenkapital-Finanzierungseffekt." },
    { text:"Banken und Lieferant:innen sind typische Eigenkapitalgeber.", correct:false,
      explain:"Falsch. Banken und Lieferant:innen sind die wichtigsten Fremdkapitalgeber." },
    { text:"Eine GmbH kann zusätzliches Eigenkapital nur über die Börse durch Aktienemission aufnehmen.", correct:false,
      explain:"Falsch. Eine GmbH gibt keine Aktien aus; sie kann z. B. neue Gesellschafter aufnehmen oder Stammeinlagen erhöhen." }
  ]
},

{ id:"f10", topic:"finanzierung", difficulty:"schwer",
  title:"Aktien als Finanzierungsinstrument",
  stem:"Welche der folgenden Aussagen zu Aktien ist/sind korrekt?",
  statements:[
    { text:"Die Aktie verbrieft ein Anteilsrecht am Grundkapital der AG.", correct:true,
      explain:"Richtig. Sie ist ein Eigenkapital-Wertpapier." },
    { text:"Der Kurs einer Aktie kommt durch Angebot und Nachfrage zustande.", correct:true,
      explain:"Richtig. Der Preis (Kurs) bildet sich am Markt für die Aktien dieser AG." },
    { text:"Eine Rückzahlung des Aktienkapitals an die Aktionäre erfolgt am Ende einer festen Laufzeit.", correct:false,
      explain:"Falsch. Eine Rückzahlung ist nicht vorgesehen; Aktienkapital ist unbefristet zur Verfügung gestelltes Kapital." },
    { text:"Beim Handel bestehender Aktien zwischen Anleger:innen entsteht ein zusätzlicher Finanzierungseffekt für die AG.", correct:false,
      explain:"Falsch. Ein Finanzierungseffekt entsteht nur bei der Emission; vom späteren Handel profitieren nur die Aktionäre." },
    { text:"Aktien brachten seit dem Jahr 1900 im Schnitt einen höheren jährlichen Ertrag als Sparguthaben.", correct:true,
      explain:"Richtig. Im Schnitt rund 6,5 % pro Jahr gegenüber 0,6 % bei Sparguthaben." }
  ]
},

{ id:"f11", topic:"finanzierung", difficulty:"schwer",
  title:"Bezugsrecht und Kapitalerhöhung",
  stem:"Welche der folgenden Aussagen zur Kapitalerhöhung ist/sind korrekt?",
  statements:[
    { text:"Bei einer Kapitalerhöhung haben zunächst die bestehenden Aktionäre das Recht, junge Aktien zu kaufen.", correct:true,
      explain:"Richtig. Dieses Recht ist das Bezugsrecht." },
    { text:"Mit dem Bezugsrecht können Aktionäre ihren prozentuellen Anteil am Grundkapital gleich halten.", correct:true,
      explain:"Richtig. Wer junge Aktien kauft, behält seinen Anteil; alternativ kann das Bezugsrecht verkauft werden." },
    { text:"Das Bezugsrecht ist nicht übertragbar und kann nicht verkauft werden.", correct:false,
      explain:"Falsch. Das Bezugsrecht kann verkauft werden – dann können andere Personen neue Aktionäre werden." },
    { text:"'Junge Aktien' sind die im Rahmen einer Kapitalerhöhung neu ausgegebenen Aktien.", correct:true,
      explain:"Richtig. Sie stehen den Altaktionären über das Bezugsrecht zuerst zur Verfügung." },
    { text:"Eine Kapitalerhöhung führt der AG kein neues Kapital zu.", correct:false,
      explain:"Falsch. Durch den Verkauf der jungen Aktien wird der AG neues Eigenkapital zugeführt." }
  ]
},

{ id:"f12", topic:"finanzierung", difficulty:"schwer",
  title:"Anleihen als Fremdkapital",
  stem:"Welche der folgenden Aussagen zu Anleihen ist/sind korrekt?",
  statements:[
    { text:"Eine Anleihe verbrieft ein Forderungsrecht gegenüber dem Emittenten.", correct:true,
      explain:"Richtig. Der Emittent (Staat oder Unternehmen) borgt sich Geld von den Anleihengläubigern aus." },
    { text:"Anleihen werden auch Schuldverschreibungen, Renten oder Bonds genannt.", correct:true,
      explain:"Richtig. Das sind gängige Bezeichnungen für Anleihen." },
    { text:"Anleihen stellen für den Emittenten Eigenkapital dar.", correct:false,
      explain:"Falsch. Anleihen sind Fremdkapital; sie verbriefen eine Forderung, kein Anteilsrecht." },
    { text:"Durch die Stückelung kann ein großer Geldbetrag von vielen Geldgebern aufgebracht werden.", correct:true,
      explain:"Richtig. Das Anleihenominale wird in kleinere Teilbeträge zerlegt." },
    { text:"Am Ende der Laufzeit wird eine Anleihe üblicherweise getilgt (zurückgezahlt).", correct:true,
      explain:"Richtig. Das ausgeborgte Geld wird zum Nominale (oder festgelegten Kurs) zurückgezahlt." }
  ]
},

{ id:"f13", topic:"finanzierung", difficulty:"schwer",
  title:"Verzinsung von Anleihen und Euribor",
  stem:"Welche der folgenden Aussagen zur Verzinsung von Anleihen ist/sind korrekt?",
  statements:[
    { text:"Die Verzinsung einer Anleihe kann während der Laufzeit fix oder variabel sein.", correct:true,
      explain:"Richtig. Die Verzinsung zählt zu den wichtigsten Anleihebedingungen." },
    { text:"Variabel verzinste Anleihen werden auch 'Floater' genannt.", correct:true,
      explain:"Richtig. Ihr Zinssatz wird an das allgemeine Zinsniveau angepasst." },
    { text:"Der Euribor ist der Zinssatz, zu dem Zentralbanken Privatpersonen Kredite gewähren.", correct:false,
      explain:"Falsch. Der Euribor (Euro Interbank Offered Rate) ist der Zinssatz, zu dem sich Banken untereinander kurzfristig Geld leihen." },
    { text:"Anleihengläubiger erzielen Erträge aus Zinsen und gegebenenfalls aus Kursdifferenzen.", correct:true,
      explain:"Richtig. Neben den Zinsen kann beim vorzeitigen Verkauf ein Kursgewinn (oder -verlust) entstehen." },
    { text:"Bei variabler Verzinsung wird die Verzinsung an das allgemeine Zinsniveau (z. B. den Euribor) angepasst.", correct:true,
      explain:"Richtig. So bewegt sich der Anleihezins mit dem Marktzins." }
  ]
},

{ id:"f14", topic:"finanzierung", difficulty:"mittel",
  title:"Finanzbedarf und Liquidität",
  stem:"Welche der folgenden Aussagen zum Finanzbedarf ist/sind korrekt?",
  statements:[
    { text:"Neben dem langfristigen Finanzbedarf (Investitionen) gibt es auch einen kurzfristigen Finanzbedarf.", correct:true,
      explain:"Richtig. Laufende Zahlungen wie Wareneinkauf, Löhne und Miete erzeugen kurzfristigen Bedarf." },
    { text:"Oft müssen Lieferant:innen früher bezahlt werden, als Einnahmen aus Verkäufen eingehen.", correct:true,
      explain:"Richtig. Diese zeitliche Lücke begründet den kurzfristigen Finanzierungsbedarf." },
    { text:"Ist die Liquidität nicht mehr gegeben, droht dem Unternehmen die Insolvenz.", correct:true,
      explain:"Richtig. Zahlungsfähigkeit ist überlebenswichtig für ein Unternehmen." },
    { text:"Langfristige Investitionen sollten möglichst kurzfristig finanziert werden.", correct:false,
      explain:"Falsch. Langfristig gebundenes Vermögen sollte auch langfristig finanziert werden (goldene Bilanzregel)." },
    { text:"Finanzierung dient nur Investitionen, nicht laufenden Zahlungen wie Löhnen oder Miete.", correct:false,
      explain:"Falsch. Finanzierung dient sowohl Investitionen als auch laufenden, wiederkehrenden Zahlungen." }
  ]
}
,

/* ===== RECHNUNGSWESEN (Erweiterung) ===== */
{ id:"r5", topic:"rechnungswesen", difficulty:"mittel",
  title:"Bereiche des Rechnungswesens",
  stem:"Welche der folgenden Aussagen zu den Bereichen des betrieblichen Rechnungswesens ist/sind korrekt?",
  statements:[
    { text:"Die Finanzrechnung beantwortet, ob das Unternehmen mit seinen finanziellen Mitteln auskommt oder ein Finanzierungsbedarf besteht.", correct:true,
      explain:"Richtig. Sie umfasst Finanzplanung, Budgetierung und Cashflow." },
    { text:"Die Buchhaltung erstellt die Bilanz sowie die Gewinn- und Verlustrechnung.", correct:true,
      explain:"Richtig. Sie zeigt das Vermögen und dessen Finanzierung sowie Gewinn oder Verlust." },
    { text:"Die Kostenrechnung ist für alle Unternehmen gesetzlich verpflichtend.", correct:false,
      explain:"Falsch. Die Kostenrechnung ist nicht gesetzlich verpflichtend; sie ist internes Rechnungswesen zu Steuerungszwecken." },
    { text:"Die Buchhaltung wird auch als externes Rechnungswesen bezeichnet.", correct:true,
      explain:"Richtig. Sie hat eine Informations- und Dokumentationsfunktion nach außen (u. a. für die Steuerbehörde)." },
    { text:"Die Kostenrechnung beantwortet, wie viel ein im Unternehmen erzeugtes Produkt kostet.", correct:true,
      explain:"Richtig. Sie zeigt auch, wie viel der Verkauf eines Produkts zur Kostendeckung beiträgt." }
  ]
},

{ id:"r6", topic:"rechnungswesen", difficulty:"schwer",
  title:"Liquidität und Cashflow",
  stem:"Welche der folgenden Aussagen zu Liquidität und Cashflow ist/sind korrekt?",
  statements:[
    { text:"Ein positiver Cashflow ist ein Indikator für Zahlungsfähigkeit.", correct:true,
      explain:"Richtig. Übersteigen die Einzahlungen die Auszahlungen, gibt es einen Zahlungsmittelzufluss." },
    { text:"Der Cashflow ergibt sich, indem Einzahlungen und Auszahlungen einer Periode gegenübergestellt werden.", correct:true,
      explain:"Richtig. Er misst den Zu- oder Abfluss an Zahlungsmitteln." },
    { text:"Cashflow und Gewinn sind stets identisch.", correct:false,
      explain:"Falsch. Man kann einen Gewinn ohne liquide Mittel erzielen und liquide sein, ohne Gewinn zu machen." },
    { text:"Übersteigen die Auszahlungen die Einzahlungen, ist die Zahlungsfähigkeit gefährdet.", correct:true,
      explain:"Richtig. Dann muss das Unternehmen sofort Gegenmaßnahmen ergreifen." },
    { text:"Um die Liquidität zu sichern, kann ein Unternehmen längere Zahlungsziele mit Lieferant:innen vereinbaren.", correct:true,
      explain:"Richtig. Weitere Maßnahmen sind kürzere Zahlungsziele für Kund:innen, niedrigere Lagerstände oder ein kurzfristiger Kredit." }
  ]
},

{ id:"r7", topic:"rechnungswesen", difficulty:"schwer",
  title:"EAR und doppelte Buchhaltung",
  stem:"Welche der folgenden Aussagen zur Gewinnermittlung ist/sind korrekt?",
  statements:[
    { text:"Einzelunternehmen und Personengesellschaften mit unter 700.000 Euro Umsatz dürfen eine Einnahmen-Ausgaben-Rechnung führen.", correct:true,
      explain:"Richtig. Die EAR ist weniger aufwendig als die doppelte Buchhaltung." },
    { text:"Kapitalgesellschaften müssen immer eine doppelte Buchhaltung führen.", correct:true,
      explain:"Richtig. Unabhängig vom Umsatz erstellen sie Bilanz und G&V." },
    { text:"Bei der doppelten Buchhaltung wird der Gewinn nur auf eine einzige Weise ermittelt.", correct:false,
      explain:"Falsch. Der Gewinn ergibt sich aus der G&V UND aus dem Vergleich des Eigenkapitals – daher 'doppelte' Gewinnermittlung." },
    { text:"Die Einnahmen-Ausgaben-Rechnung ist aufwendiger als die doppelte Buchhaltung.", correct:false,
      explain:"Falsch. Die EAR ist gerade die weniger aufwendige Variante." },
    { text:"Aktiengesellschaften und große GmbHs müssen ihren Jahresabschluss veröffentlichen.", correct:true,
      explain:"Richtig. Im Firmenbuch geführte Unternehmen müssen zudem bestimmte Zahlen melden." }
  ]
},

{ id:"r8", topic:"rechnungswesen", difficulty:"schwer",
  title:"Soll- und Haben-Logik der Bilanz",
  stem:"Welche der folgenden Aussagen zur Logik der Bilanz ist/sind korrekt?",
  statements:[
    { text:"Die Summe der Aktiva entspricht stets der Summe der Passiva.", correct:true,
      explain:"Richtig. Jeder Teil des Vermögens muss finanziert worden sein – daher die Bilanzgleichheit." },
    { text:"Die Aktiva stehen auf der Sollseite, die Passiva auf der Habenseite der Bilanz.", correct:true,
      explain:"Richtig. Daraus folgt die Soll-Haben-Gleichheit der Bilanz." },
    { text:"Die Sollseite zeigt, woher die Mittel des Unternehmens stammen.", correct:false,
      explain:"Falsch. Die Sollseite zeigt die Mittelverwendung (wofür). Die Mittelherkunft (woher) steht auf der Habenseite." },
    { text:"Das Eigenkapital ist jener Teil des Vermögens, der NICHT mit Schulden finanziert wurde.", correct:true,
      explain:"Richtig. Eigenkapital = Vermögen − Fremdkapital." },
    { text:"Ein Steigen des Eigenkapitals im Vergleich zweier Stichtage bedeutet einen Verlust.", correct:false,
      explain:"Falsch. Ein Steigen des Eigenkapitals bedeutet einen Gewinn, ein Sinken einen Verlust." }
  ]
},

{ id:"r9", topic:"rechnungswesen", difficulty:"mittel",
  title:"Anlage- und Umlaufvermögen",
  stem:"Welche der folgenden Aussagen zu Anlage- und Umlaufvermögen ist/sind korrekt?",
  statements:[
    { text:"Anlagevermögen bleibt typischerweise länger als ein Jahr im Unternehmen.", correct:true,
      explain:"Richtig. Dazu zählen z. B. Gebäude und Maschinen." },
    { text:"Vorräte zählen zum Umlaufvermögen.", correct:true,
      explain:"Richtig. Umlaufvermögen bleibt in der Regel kürzer als ein Jahr im Unternehmen." },
    { text:"Maschinen und Gebäude zählen zum Umlaufvermögen.", correct:false,
      explain:"Falsch. Maschinen und Gebäude sind Anlagevermögen, weil sie langfristig im Unternehmen bleiben." },
    { text:"Ein 'umlaufintensives' Unternehmen hat deutlich mehr Umlauf- als Anlagevermögen.", correct:true,
      explain:"Richtig. Beim Fahrradproduzenten dominieren z. B. die Vorräte." },
    { text:"Die goldene Bilanzregel besagt, dass langfristig gebundenes Vermögen kurzfristig finanziert sein sollte.", correct:false,
      explain:"Falsch. Die goldene Bilanzregel fordert, dass langfristig gebundenes Vermögen auch LANGFRISTIG finanziert ist." }
  ]
},

{ id:"r10", topic:"rechnungswesen", difficulty:"schwer",
  title:"Die Gewinn- und Verlustrechnung",
  stem:"Welche der folgenden Aussagen zur Gewinn- und Verlustrechnung ist/sind korrekt?",
  statements:[
    { text:"In der G&V werden von den Erlösen und Erträgen die Aufwände abgezogen.", correct:true,
      explain:"Richtig. So wird das Jahresergebnis ermittelt." },
    { text:"Abschreibungen und die Bildung von Rückstellungen zählen zu den Aufwänden.", correct:true,
      explain:"Richtig. Neben Löhnen, Material und Miete mindern auch sie das Ergebnis." },
    { text:"Übersteigt die Summe aus Erlösen und Erträgen die Aufwände, entsteht ein Verlust.", correct:false,
      explain:"Falsch. In diesem Fall entsteht ein Gewinn; ein Verlust entsteht, wenn die Aufwände überwiegen." },
    { text:"Das EBIT ist das Ergebnis vor Zinsen und Steuern.", correct:true,
      explain:"Richtig. EBIT = Earnings Before Interest and Taxes." },
    { text:"Der Gewinn erhöht das Eigenkapital.", correct:true,
      explain:"Richtig. Daher kann der Gewinn auch über den Eigenkapitalvergleich ermittelt werden (doppelte Gewinnermittlung)." }
  ]
},

{ id:"r11", topic:"rechnungswesen", difficulty:"schwer",
  title:"Die Cashflowrechnung",
  stem:"Welche der folgenden Aussagen zur Cashflowrechnung ist/sind korrekt?",
  statements:[
    { text:"Die Cashflowrechnung gliedert sich in Betriebs-, Investitions- und Finanzierungstätigkeit.", correct:true,
      explain:"Richtig. Diese drei Bereiche zeigen die Ursachen der Zu- und Abflüsse." },
    { text:"Der Bereich Betriebstätigkeit gilt als wichtigster Teil der Cashflowrechnung.", correct:true,
      explain:"Richtig. Er betrifft den Kern des Geschäfts; Investor:innen achten besonders darauf." },
    { text:"Die Aufnahme eines Kredits zeigt sich im Bereich Investitionstätigkeit.", correct:false,
      explain:"Falsch. Die Kreditaufnahme zählt zur Finanzierungstätigkeit." },
    { text:"Der Kauf von Anlagevermögen schlägt sich im Bereich Investitionstätigkeit nieder.", correct:true,
      explain:"Richtig. Auch der Verkauf von Anlagevermögen erscheint hier (als Mittelzufluss)." },
    { text:"Investor:innen achten besonders auf den Cashflow aus der Betriebstätigkeit.", correct:true,
      explain:"Richtig. Er zeigt, ob der Kernbereich des Unternehmens Einzahlungsüberschüsse erwirtschaftet." }
  ]
},

{ id:"r12", topic:"rechnungswesen", difficulty:"mittel",
  title:"Fixe und variable Kosten",
  stem:"Welche der folgenden Aussagen zu den Kostenarten ist/sind korrekt?",
  statements:[
    { text:"Fixe Kosten fallen unabhängig von der produzierten Menge an.", correct:true,
      explain:"Richtig. Dazu zählen z. B. Geschäftsführergehälter, Miete und Versicherungen." },
    { text:"Die Miete für die Produktionshalle ist eine fixe Kostenart.", correct:true,
      explain:"Richtig. Sie fällt unabhängig von der produzierten Stückzahl an." },
    { text:"Die Materialkosten für die Bestandteile eines Fahrrads sind fixe Kosten.", correct:false,
      explain:"Falsch. Materialkosten steigen (in der Regel proportional) mit der Produktionsmenge – sie sind variabel." },
    { text:"Der kalkulatorische Unternehmerlohn ist eine Kostenart, die in der Buchhaltung nicht als Aufwand erfasst ist.", correct:true,
      explain:"Richtig. Er ist eine typische Differenz zwischen Kosten und buchhalterischen Aufwänden." },
    { text:"Variable Kosten bleiben bei steigender Produktionsmenge konstant.", correct:false,
      explain:"Falsch. Variable Kosten steigen mit der Produktionsmenge; fixe Kosten bleiben konstant." }
  ]
},

{ id:"r13", topic:"rechnungswesen", difficulty:"schwer",
  title:"Deckungsbeitrag berechnen",
  scenario:"Ein Unternehmen verkauft ein Produkt um 60 Euro. Die variablen Stückkosten betragen 24 Euro.",
  stem:"Welche der folgenden Aussagen ist/sind korrekt?",
  statements:[
    { text:"Der Deckungsbeitrag pro Stück beträgt 36 Euro.", correct:true,
      explain:"Richtig. Deckungsbeitrag = Verkaufspreis − variable Kosten = 60 − 24 = 36 Euro." },
    { text:"Die Deckungsquote beträgt 60 %.", correct:true,
      explain:"Richtig. Deckungsquote = Deckungsbeitrag ÷ Verkaufspreis = 36 ÷ 60 = 60 %." },
    { text:"Der Deckungsbeitrag ist jener Betrag, der zur Deckung der fixen Kosten beiträgt.", correct:true,
      explain:"Richtig. Übersteigt der Preis die variablen Kosten, leistet die Differenz einen Beitrag zur Fixkostendeckung." },
    { text:"Solange der Verkaufspreis über den variablen Kosten liegt, wird kein Deckungsbeitrag erzielt.", correct:false,
      explain:"Falsch. Gerade dann WIRD ein Deckungsbeitrag erzielt – nämlich die Differenz zwischen Preis und variablen Kosten." },
    { text:"Kurzfristig kann ein Verkauf über den variablen, aber unter den Vollkosten sinnvoll sein.", correct:true,
      explain:"Richtig. Solange ein Deckungsbeitrag erzielt wird, ist das besser, als gar nicht zu verkaufen." }
  ]
},

{ id:"r14", topic:"rechnungswesen", difficulty:"schwer",
  title:"Break-Even-Umsatz berechnen",
  scenario:"Ein Unternehmen hat gesamte Fixkosten von 3 Mio. Euro. Die durchschnittliche Deckungsquote über alle Produkte beträgt 60 %.",
  stem:"Welche der folgenden Aussagen ist/sind korrekt?",
  statements:[
    { text:"Der Break-Even-Umsatz beträgt 5 Mio. Euro.", correct:true,
      explain:"Richtig. Break-Even-Umsatz = Fixkosten ÷ Deckungsquote = 3 Mio. ÷ 0,6 = 5 Mio. Euro." },
    { text:"Oberhalb des Break-Even-Umsatzes kommt das Unternehmen in die Gewinnzone.", correct:true,
      explain:"Richtig. Am Break-Even-Punkt sind alle Kosten gedeckt; darüber entsteht Gewinn." },
    { text:"Der Break-Even-Umsatz berechnet sich, indem man die Fixkosten mit der Deckungsquote multipliziert.", correct:false,
      explain:"Falsch. Die Fixkosten werden durch die Deckungsquote DIVIDIERT, nicht multipliziert." },
    { text:"Am Break-Even-Punkt sind alle Kosten gerade gedeckt.", correct:true,
      explain:"Richtig. Es wird weder Gewinn noch Verlust erzielt." },
    { text:"Eine höhere Deckungsquote senkt bei gleichen Fixkosten den nötigen Break-Even-Umsatz.", correct:true,
      explain:"Richtig. Je höher die Quote, desto weniger Umsatz ist zur Deckung der Fixkosten nötig." }
  ]
},

{ id:"r15", topic:"rechnungswesen", difficulty:"schwer",
  title:"Bilanzanalyse FunBike GmbH",
  scenario:"Nachstehend sehen Sie eine vereinfachte Bilanz der FunBike GmbH, eines Fahrradproduzenten, per 31.12.20xx (alle Beträge in Euro). Das Anlagevermögen umfasst Grundstücke/Bauten, technische Anlagen/Geschäftsausstattung und Finanzanlagen.",
  bilanz: {
    aktiva: [
      { name:"Anlagevermögen", value:"", head:true },
      { name:"Grundstücke und Bauten", value:"750 000" },
      { name:"Technische Anlagen, Geschäftsausstattung", value:"2 330 000" },
      { name:"Finanzanlagen", value:"240 000" },
      { name:"Umlaufvermögen", value:"", head:true },
      { name:"Vorräte", value:"5 400 000" },
      { name:"Forderungen aus Lieferungen und Leistungen", value:"598 000" },
      { name:"Bankguthaben und Barbestand", value:"320 250" }
    ],
    passiva: [
      { name:"Eigenkapital", value:"", head:true },
      { name:"Bareinlagen der Gesellschafter", value:"525 000" },
      { name:"Gewinn", value:"3 614 250" },
      { name:"Fremdkapital", value:"", head:true },
      { name:"Rückstellungen", value:"2 000 000" },
      { name:"Bankkredite", value:"3 199 000" },
      { name:"Verbindlichkeiten aus Lieferungen und Leistungen", value:"300 000" }
    ],
    summe: "9 638 250"
  },
  stem:"Welche der folgenden Aussagen zu dieser Bilanz ist/sind korrekt?",
  statements:[
    { text:"Die Summe der Aktiva entspricht der Summe der Passiva und beträgt 9.638.250 Euro.", correct:true,
      explain:"Richtig. Vermögen = Kapital; die Bilanzsumme beträgt auf beiden Seiten 9.638.250 Euro." },
    { text:"Das Eigenkapital beträgt 4.139.250 Euro.", correct:true,
      explain:"Richtig. Eigenkapital = Bareinlagen 525.000 + Gewinn 3.614.250 = 4.139.250 Euro." },
    { text:"Das Unternehmen ist anlageintensiv, weil das Anlagevermögen das Umlaufvermögen übersteigt.", correct:false,
      explain:"Falsch. Das Umlaufvermögen (6.318.250) übersteigt das Anlagevermögen (3.320.000) – das Unternehmen ist umlaufintensiv." },
    { text:"Verbleibt der hohe Gewinn im Unternehmen, stärkt er das Eigenkapital und die Innenfinanzierungskraft.", correct:true,
      explain:"Richtig. Einbehaltene Gewinne erhöhen das Eigenkapital und machen das Unternehmen krisenresistenter." },
    { text:"Das langfristige Vermögen ist nicht langfristig finanziert; die goldene Bilanzregel ist verletzt.", correct:false,
      explain:"Falsch. Schon das Eigenkapital (über 4 Mio.) übersteigt das Anlagevermögen (gut 3 Mio.) – die goldene Bilanzregel ist erfüllt." }
  ]
},

{ id:"r16", topic:"rechnungswesen", difficulty:"mittel",
  title:"Gewinn, Liquidität und Kosten",
  stem:"Welche der folgenden Aussagen zu Gewinn, Liquidität und Kosten ist/sind korrekt?",
  statements:[
    { text:"Man kann einen Gewinn erzielen, ohne über liquide Mittel zu verfügen.", correct:true,
      explain:"Richtig. Gewinn und Cashflow sind unterschiedliche Kennzahlen." },
    { text:"Kosten sind der wertmäßige Verbrauch von Leistungsfaktoren bei der Leistungserstellung.", correct:true,
      explain:"Richtig. Dazu zählen z. B. Maschinen, Arbeit und Einsatzstoffe." },
    { text:"Kosten und Aufwände aus der Buchhaltung sind immer exakt identisch.", correct:false,
      explain:"Falsch. Sie entsprechen sich weitgehend, es gibt aber Differenzen wie den kalkulatorischen Unternehmerlohn." },
    { text:"Jedes Unternehmen ist gesetzlich verpflichtet, seinen Gewinn oder Verlust je Geschäftsjahr zu ermitteln.", correct:true,
      explain:"Richtig. Das ist u. a. für die Berechnung der Ertragssteuern notwendig." },
    { text:"Auf Dauer kann ein Unternehmen auch dann bestehen, wenn seine Kosten nicht durch Erträge gedeckt sind.", correct:false,
      explain:"Falsch. Auf Dauer kann kein Unternehmen existieren, wenn die Kosten nicht durch die Erträge gedeckt sind." }
  ]
},

/* ===== MARKETING (Erweiterung) ===== */
{ id:"m5", topic:"marketing", difficulty:"mittel",
  title:"Grundverständnis Marketing",
  stem:"Welche der folgenden Aussagen zum Marketing ist/sind korrekt?",
  statements:[
    { text:"Marketing ist die systematische Ausrichtung des gesamten Unternehmens an den Bedürfnissen und Wünschen der Kunden.", correct:true,
      explain:"Richtig. Marketing betrifft alle betrieblichen Bereiche, nicht nur die Werbung." },
    { text:"Werbung ist nur ein kleiner Teilbereich des gesamten Marketings.", correct:true,
      explain:"Richtig. Entgegen der landläufigen Vermutung umfasst Marketing weit mehr als Werbung." },
    { text:"Im Marketing zählen ausschließlich physisch greifbare Güter als 'Produkt'.", correct:false,
      explain:"Falsch. Auch Dienstleistungen, Ideen, Organisationen, Personen und Orte gelten im Marketing als 'Produkt'." },
    { text:"Auch Hilfsorganisationen, Parteien und Städte können Marketing betreiben.", correct:true,
      explain:"Richtig. Marketing ist nicht auf klassische Produktunternehmen beschränkt." },
    { text:"Produziert ein Unternehmen 'am Markt vorbei', ist sein wirtschaftlicher Erfolg gefährdet.", correct:true,
      explain:"Richtig. Wird das Angebot nicht nachgefragt, kann das Unternehmen seine Kosten nicht decken." }
  ]
},

{ id:"m6", topic:"marketing", difficulty:"schwer",
  title:"Marktsegmentierung und USP",
  stem:"Welche der folgenden Aussagen zu Segmentierung und Positionierung ist/sind korrekt?",
  statements:[
    { text:"Bei der Marktsegmentierung wird der Markt in Käufergruppen mit gemeinsamen Merkmalen aufgeteilt.", correct:true,
      explain:"Richtig. So lassen sich Produktentwicklung, Preise, Absatzwege und Werbung gezielter ausrichten." },
    { text:"Zielgruppen sind ausschließlich jene Personen, die das Produkt selbst kaufen.", correct:false,
      explain:"Falsch. Zielgruppen umfassen auch jene, die die Kaufentscheidung beeinflussen, und jene, die das Produkt nutzen." },
    { text:"Zielgruppenorientiertes Marketing erfolgt in den Phasen Segmentierung, Auswahl und Positionierung.", correct:true,
      explain:"Richtig. Zuerst segmentieren, dann Zielsegmente festlegen, dann positionieren." },
    { text:"Eine USP (Unique Selling Proposition) soll ein Produkt unverwechselbar von der Konkurrenz abheben.", correct:true,
      explain:"Richtig. Das Produkt soll für die Zielgruppe besonders wünschenswert und unterscheidbar sein." },
    { text:"Die Marktpositionierung beschreibt allein die Produktionskosten eines Produkts.", correct:false,
      explain:"Falsch. Die Positionierung beschreibt, wie das Produkt von den Konsument:innen wahrgenommen wird bzw. werden soll." }
  ]
},

{ id:"m7", topic:"marketing", difficulty:"mittel",
  title:"Grund- und Zusatznutzen",
  stem:"Welche der folgenden Aussagen zum Kundennutzen ist/sind korrekt?",
  statements:[
    { text:"Der Grundnutzen eines Fahrrads ist das Fahren.", correct:true,
      explain:"Richtig. Der Grundnutzen ist der primäre Zweck eines Produkts." },
    { text:"Der Geltungsnutzen ist ein Zusatznutzen und betrifft das Prestige, sich ein Produkt leisten zu können.", correct:true,
      explain:"Richtig. Der Geltungsnutzen geht über den Grundnutzen hinaus." },
    { text:"Der Erlebnisnutzen zählt zum Grundnutzen.", correct:false,
      explain:"Falsch. Der Erlebnisnutzen ist ein Zusatznutzen, nicht der Grundnutzen." },
    { text:"Welchen Nutzen ein Produkt stiftet, sollte bei Entwicklung und Vermarktung genau überlegt werden.", correct:true,
      explain:"Richtig. Der Kundennutzen ist zentral für Produktentwicklung und Kommunikation." },
    { text:"Ein Produkt hat für Käufer:innen immer nur einen einzigen Nutzen.", correct:false,
      explain:"Falsch. Man unterscheidet Grundnutzen und (mehrere) Zusatznutzen wie Geltungs- und Erlebnisnutzen." }
  ]
},

{ id:"m8", topic:"marketing", difficulty:"mittel",
  title:"Der Marketing-Mix (4 Ps)",
  stem:"Welche der folgenden Aussagen zum Marketing-Mix ist/sind korrekt?",
  statements:[
    { text:"Die Produktpolitik (Product) betrifft Sortimentsumfang, Produktgestaltung und Zusatzleistungen.", correct:true,
      explain:"Richtig. Auch rund um ein Produkt angebotene Dienstleistungen zählen dazu." },
    { text:"Die Preispolitik (Price) umfasst Rabatte, Aktionen sowie Liefer- und Zahlungsbedingungen.", correct:true,
      explain:"Richtig. Sie betrifft die Höhe und Gestaltung der Preise und Konditionen." },
    { text:"Die Distributionspolitik (Place) betrifft vor allem die Werbebotschaft des Unternehmens.", correct:false,
      explain:"Falsch. Die Werbebotschaft gehört zur Kommunikationspolitik (Promotion). Place betrifft den Absatz- und Transportweg." },
    { text:"Die Kommunikationspolitik (Promotion) umfasst Werbung, Verkaufsförderung und Öffentlichkeitsarbeit.", correct:true,
      explain:"Richtig. Werbung ist dabei nur ein Teilbereich." },
    { text:"Die Maßnahmen des Marketing-Mix sollten nur fall- oder phasenweise eingesetzt werden.", correct:false,
      explain:"Falsch. Sie sollten laufend und systematisch aufeinander abgestimmt zum Einsatz kommen." }
  ]
},

{ id:"m9", topic:"marketing", difficulty:"schwer",
  title:"Der Produktlebenszyklus",
  stem:"Welche der folgenden Aussagen zum Produktlebenszyklus ist/sind korrekt?",
  statements:[
    { text:"In der Einführungsphase wird wegen hoher Entwicklungs- und Werbekosten erst gegen Ende Gewinn erzielt.", correct:true,
      explain:"Richtig. Hat das Produkt in dieser Phase keinen Erfolg, verschwindet es bald wieder vom Markt." },
    { text:"In der Wachstumsphase steigen Umsätze und Gewinne kräftig, und die Konkurrenz wird aufmerksam.", correct:true,
      explain:"Richtig. Nachahmer treten auf, die Preisgestaltung wird entscheidend." },
    { text:"In der Reifephase erreicht der Umsatz sein Minimum.", correct:false,
      explain:"Falsch. In der Reifephase erreicht der Umsatz sein MAXIMUM, während die Gewinne wegen der Konkurrenz schon wieder sinken." },
    { text:"In der Sättigungsphase fallen Umsatz und Gewinne, der Markt beginnt zu schrumpfen.", correct:true,
      explain:"Richtig. Spätestens hier muss entschieden werden, ob das Produkt eliminiert oder per Relaunch erneuert wird." },
    { text:"Ein Relaunch ist der Versuch, ein Produkt durch eine Produktveränderung neu zu starten.", correct:true,
      explain:"Richtig. Ein Relaunch soll den Lebenszyklus eines Produkts verlängern." }
  ]
},

{ id:"m10", topic:"marketing", difficulty:"schwer",
  title:"Produktpolitische Maßnahmen",
  stem:"Welche der folgenden Aussagen zu produktpolitischen Maßnahmen ist/sind korrekt?",
  statements:[
    { text:"Erweitert ein Unternehmen sein Sortiment um neue, andersartige Produktgruppen, ist das Produktdiversifikation.", correct:true,
      explain:"Richtig. Beispiel: Ein Fahrradhersteller bietet zusätzlich Sportbekleidung und Fitnessgeräte an." },
    { text:"Vertieft ein Unternehmen sein bestehendes Sortiment durch zusätzliche ähnliche Modelle, ist das Produktdifferenzierung.", correct:true,
      explain:"Richtig. Das Sortiment wird tiefer, nicht breiter." },
    { text:"Bei der Produktvariation werden alte und neue Version dauerhaft parallel angeboten.", correct:false,
      explain:"Falsch. Bei der Produktvariation wird nur noch die veränderte Version angeboten, die Vorgängerversion nicht mehr." },
    { text:"Produktelimination bedeutet, ein nicht mehr erfolgreiches Produkt vom Markt zu nehmen.", correct:true,
      explain:"Richtig. So werden Produkte aus dem Angebot ausgeschieden." },
    { text:"Produktdifferenzierung verbreitert das Sortiment, Produktdiversifikation vertieft es.", correct:false,
      explain:"Falsch. Es ist umgekehrt: Differenzierung vertieft, Diversifikation verbreitert das Sortiment." }
  ]
},

{ id:"m11", topic:"marketing", difficulty:"schwer",
  title:"Marktkennzahlen berechnen",
  scenario:"Ein Unternehmen erzielt mit einem Produkt 6 Mio. Euro Umsatz. Das gesamte Marktvolumen beträgt 30 Mio. Euro; der größte Mitbewerber erzielt 12 Mio. Euro.",
  stem:"Welche der folgenden Aussagen ist/sind korrekt?",
  statements:[
    { text:"Der absolute Marktanteil des Unternehmens beträgt 20 %.", correct:true,
      explain:"Richtig. Absoluter Marktanteil = (6 ÷ 30) × 100 = 20 %." },
    { text:"Der relative Marktanteil beträgt 0,5.", correct:true,
      explain:"Richtig. Relativer Marktanteil = 6 ÷ 12 = 0,5 (Unternehmensumsatz ÷ Umsatz des größten Mitbewerbers)." },
    { text:"Aufgrund des relativen Marktanteils ist das Unternehmen Marktführer.", correct:false,
      explain:"Falsch. Ein relativer Marktanteil unter 1 zeigt, dass das Unternehmen NICHT Marktführer ist." },
    { text:"Das Marktpotenzial ist die maximal mögliche Absatzmenge eines Produkts.", correct:true,
      explain:"Richtig. Es zeigt, wie groß der Markt wäre, wenn alle Interessierten kaufen würden." },
    { text:"Das Marktvolumen ist die tatsächlich verkaufte Menge des Produkts.", correct:true,
      explain:"Richtig. Liegt es nahe am Marktpotenzial, ist der Markt nahezu gesättigt." }
  ]
},

{ id:"m12", topic:"marketing", difficulty:"schwer",
  title:"Preis und Käuferverhalten",
  stem:"Welche der folgenden Aussagen zu Preis und Käuferverhalten ist/sind korrekt?",
  statements:[
    { text:"Bei einem Verkäufermarkt übersteigt die Nachfrage das Angebot.", correct:true,
      explain:"Richtig. Verkäufer:innen haben mehr Verhandlungsmacht, die Preise tendieren nach oben." },
    { text:"In einem Käufermarkt haben die Käufer:innen mehr Verhandlungsmacht.", correct:true,
      explain:"Richtig. Übersteigt das Angebot die Nachfrage, können Käufer:innen die Preise stärker beeinflussen." },
    { text:"Beim Snob-Effekt kauft man teuer, weil es andere auch tun.", correct:false,
      explain:"Falsch. Das beschreibt den Mitläufer-Effekt. Beim Snob-Effekt kauft man teuer, um zu zeigen, dass man es sich leisten kann." },
    { text:"Beim Qualitätseffekt schließt man vom hohen Preis auf eine höhere Qualität.", correct:true,
      explain:"Richtig. Käufer:innen vermuten, dass teurere Produkte besser sind." },
    { text:"Bei der Preisfestsetzung spielen Kosten, Konkurrenzpreise und Zahlungsbereitschaft eine Rolle.", correct:true,
      explain:"Richtig. Das sind die drei wesentlichen Faktoren der Preisbildung in der Praxis." }
  ]
},

{ id:"m13", topic:"marketing", difficulty:"schwer",
  title:"Distribution und Franchising",
  stem:"Welche der folgenden Aussagen zur Distributionspolitik ist/sind korrekt?",
  statements:[
    { text:"Beim direkten Absatz verkauft das produzierende Unternehmen ohne Zwischenhändler an den Endabnehmer.", correct:true,
      explain:"Richtig. Bestellt man direkt beim Produzenten, handelt es sich um einen direkten Absatzweg." },
    { text:"Beim indirekten Absatz sind Handelsbetriebe wie Groß- oder Einzelhändler zwischengeschaltet.", correct:true,
      explain:"Richtig. Großhändler verkaufen an andere Händler, Einzelhändler an die Letztverbraucher." },
    { text:"Der Franchisenehmer ist ein unselbstständiger Angestellter des Franchisegebers.", correct:false,
      explain:"Falsch. Der Franchisenehmer ist rechtlich und wirtschaftlich selbständig, aber an das Marketingkonzept gebunden." },
    { text:"Beim Franchising stellt der Franchisegeber Markenname, Produkte und Marketing-Know-how gegen Gebühr zur Verfügung.", correct:true,
      explain:"Richtig. Die Franchisegebühr ist meist ein Fixbetrag plus Umsatzbeteiligung." },
    { text:"Die Distributionspolitik betrifft den Absatzweg und den Transportweg.", correct:true,
      explain:"Richtig. Sie beantwortet, wie und über welchen Weg das Produkt zum Kunden gelangt." }
  ]
},

{ id:"m14", topic:"marketing", difficulty:"mittel",
  title:"Kommunikationspolitik",
  stem:"Welche der folgenden Aussagen zur Kommunikationspolitik ist/sind korrekt?",
  statements:[
    { text:"Zur Kommunikationspolitik zählen Werbung, Verkaufsförderung und Öffentlichkeitsarbeit.", correct:true,
      explain:"Richtig. Dazu gehört auch der Internet- und Social-Media-Auftritt sowie 'Personal Selling'." },
    { text:"Public Relations (PR) bezieht sich oft auf das gesamte Unternehmen, nicht nur auf einzelne Produkte.", correct:true,
      explain:"Richtig. PR umfasst z. B. Pressekonferenzen, Presseaussendungen und Sponsoring." },
    { text:"Social-Media-Marketing hat in den letzten Jahren an Bedeutung verloren.", correct:false,
      explain:"Falsch. Social-Media-Marketing hat enorm an Bedeutung GEWONNEN, die Nutzerzahlen sind stark gestiegen." },
    { text:"Personal Selling bezeichnet das Verhalten der Verkäufer:innen.", correct:true,
      explain:"Richtig. Der persönliche Verkauf ist Teil der Kommunikationspolitik." },
    { text:"Event-Marketing nutzt erlebnisorientierte Veranstaltungen, um Kund:innen zu aktivieren.", correct:true,
      explain:"Richtig. Messen, Modeschauen oder Eröffnungen sollen Aufmerksamkeit erzeugen." }
  ]
},

/* ===== DIGITALISIERUNG (Erweiterung) ===== */
{ id:"d4", topic:"digitalisierung", difficulty:"mittel",
  title:"Digitale Transformation",
  stem:"Welche der folgenden Aussagen zur Digitalisierung ist/sind korrekt?",
  statements:[
    { text:"Digitalisierung meint die Anwendung digitaler Informations- und Kommunikationstechnologie und die dadurch vorangetriebene Veränderung.", correct:true,
      explain:"Richtig. Diese Veränderung wird als digitale Transformation bezeichnet." },
    { text:"'Ubiquitous Computing' beschreibt die Allgegenwärtigkeit von Rechensystemen.", correct:true,
      explain:"Richtig. Technologie ist heute in nahezu allen Lebensbereichen präsent." },
    { text:"Die Wirtschaftsinformatik beschäftigt sich u. a. mit den Auswirkungen von Technologie auf Wirtschaft und Gesellschaft.", correct:true,
      explain:"Richtig. Sie untersucht, wie Technologie uns unterstützt und welche Folgen das hat." },
    { text:"Die digitale Transformation betrifft ausschließlich die Werbung eines Unternehmens.", correct:false,
      explain:"Falsch. Sie betrifft interne Prozesse, die Kundenbeziehung und die Gestaltung von Produkten und Dienstleistungen." },
    { text:"Die digitale Transformation soll Nutzen und Erlebnis eines Produkts möglichst innovativ erweitern.", correct:true,
      explain:"Richtig. Die Transformation soll nicht im Weg stehen, sondern den Nutzen erweitern." }
  ]
},

{ id:"d5", topic:"digitalisierung", difficulty:"schwer",
  title:"Die drei Dimensionen der Digitalisierung",
  stem:"Welche der folgenden Aussagen zu den drei Dimensionen der Digitalisierung ist/sind korrekt?",
  statements:[
    { text:"Die 'Backstage'-Dimension betrifft die internen, wertschöpfenden Geschäftsprozesse hinter den Kulissen.", correct:true,
      explain:"Richtig. Hier liegt der interne Fokus auf der effizienten Nutzung von Ressourcen." },
    { text:"Die 'Frontstage'-Dimension ist auf den Kunden ausgerichtet (externer Fokus).", correct:true,
      explain:"Richtig. Sie versteht sich als Verbindung zwischen Kunden und Unternehmen." },
    { text:"Die dritte Dimension befasst sich mit der Digitalisierung der Produkte und Dienstleistungen ('smarte' Produkte).", correct:true,
      explain:"Richtig. Das Ergebnis der Wertschöpfung wird durch Technologie erweitert." },
    { text:"Ein Kunde kann im Sinne der Frontstage nur eine Privatperson sein.", correct:false,
      explain:"Falsch. Ein Kunde kann eine Privatperson, ein Unternehmen oder eine öffentliche Institution sein." },
    { text:"Die drei Dimensionen schließen einander aus; ein Unternehmen darf nur eine bearbeiten.", correct:false,
      explain:"Falsch. Unternehmen können sich gezielt auf eine ODER mehrere Dimensionen konzentrieren." }
  ]
},

{ id:"d6", topic:"digitalisierung", difficulty:"schwer",
  title:"Der Geschäftsprozess",
  stem:"Welche der folgenden Aussagen zum Geschäftsprozess ist/sind korrekt?",
  statements:[
    { text:"Ein Geschäftsprozess ist ein Arbeitsablauf aus mehreren logisch zusammenhängenden Aktivitäten.", correct:true,
      explain:"Richtig. Er leistet einen Beitrag (Wert) zu einem betriebswirtschaftlichen Ziel." },
    { text:"Geschäftsprozesse können wiederholt durchgeführt werden und haben einen klar definierten Anfang und ein oder mehrere Enden.", correct:true,
      explain:"Richtig. Das unterscheidet sie von einmaligen, unstrukturierten Handlungen." },
    { text:"Ein Prozessmodell ist ein visuelles Abbild eines Geschäftsprozesses.", correct:true,
      explain:"Richtig. Es hilft, einen Prozess zu kommunizieren und einen Überblick zu gewinnen." },
    { text:"Ein Geschäftsprozess leistet keinen Beitrag zu betriebswirtschaftlichen Zielen.", correct:false,
      explain:"Falsch. Gerade das Leisten eines Wertbeitrags zu einem Ziel ist ein Kernmerkmal des Geschäftsprozesses." },
    { text:"Die Dokumentation eines Prozesses durch ein digitales System erschwert die Kommunikation im Unternehmen.", correct:false,
      explain:"Falsch. Die Dokumentation ERLEICHTERT die Kommunikation und den Überblick im Unternehmen." }
  ]
},

{ id:"d7", topic:"digitalisierung", difficulty:"schwer",
  title:"Das Geschäftsmodell",
  stem:"Welche der folgenden Aussagen zum Geschäftsmodell ist/sind korrekt?",
  statements:[
    { text:"Ein Geschäftsmodell beschreibt, wie ein Unternehmen ein Produkt erzeugt, bereitstellt und vertreibt, um Gewinn zu erwirtschaften.", correct:true,
      explain:"Richtig. Es beschreibt die Wertschöpfung von der Geschäftsidee bis zum Vertrieb." },
    { text:"Der Einsatz von IT kann den geschaffenen Wert multiplizieren, z. B. durch mehr Kunden oder individualisierte Angebote.", correct:true,
      explain:"Richtig. Technologie erweitert die Möglichkeiten der Wertschöpfung." },
    { text:"Der Wechsel vom Einzelverkauf (Download) hin zum Streaming-Abo ist ein Beispiel für eine Geschäftsmodelländerung.", correct:true,
      explain:"Richtig. Spotify hat das Geschäftsmodell vom Verkauf hin zum Streaming verändert." },
    { text:"Ein Geschäftsmodell und ein Geschäftsprozess sind dasselbe.", correct:false,
      explain:"Falsch. Ein Geschäftsmodell beschreibt die Logik der Wertschöpfung; ein Geschäftsprozess ist ein konkreter Arbeitsablauf." },
    { text:"Apple veränderte mit iTunes das Geschäftsmodell, indem einzelne Musikstücke statt ganzer CDs verkauft wurden.", correct:true,
      explain:"Richtig. Der legale Onlinevertrieb einzelner Titel revolutionierte den Musikkonsum." }
  ]
},

{ id:"d8", topic:"digitalisierung", difficulty:"schwer",
  title:"Internet versus World Wide Web",
  stem:"Welche der folgenden Aussagen zu Internet und WWW ist/sind korrekt?",
  statements:[
    { text:"Das Internet ist ein weltweit verbundenes Netzwerk von Netzwerken.", correct:true,
      explain:"Richtig. Es ist die wichtigste IT-Infrastruktur für die globale Vernetzung." },
    { text:"Das WWW ist ein Dienst, der auf der Infrastruktur des Internets aufbaut.", correct:true,
      explain:"Richtig. Das WWW ermöglicht es, Informationen bereitzustellen und auffindbar zu machen." },
    { text:"Internet und WWW bezeichnen exakt dasselbe und sind technisch identisch.", correct:false,
      explain:"Falsch. Das Internet ist das Netzwerk; das WWW ist nur einer der Dienste, die darauf aufbauen." },
    { text:"Eine E-Mail ist ein weiterer Dienst, der das Internet zur Übertragung nutzt.", correct:true,
      explain:"Richtig. Auch die E-Mail nutzt das Internet, ist aber nicht Teil des WWW." },
    { text:"Der Web-Browser ist meist die direkte Schnittstelle, um auf das WWW zuzugreifen.", correct:true,

  ]
},

  statements:[

    { text:"Sein Aufsatz 'Information Management: A Proposal' legte den Grundstein für das Internet selbst.", correct:false,

    { text:"Ein Protokoll im IT-Sinn ist dasselbe wie das Protokoll einer Besprechung.", correct:false,

    { text:"Ein Netzwerk ist ein räumlich verteiltes System von Datenstationen, die zum Datenaustausch verbunden sind.", correct:true,

    { text:"Ein WLAN-Router ist ein Beispiel für eine Kommunikationseinrichtung.", correct:true,

},

{ id:"d11", topic:"digitalisierung", difficulty:"schwer",

    { text:"In der Client-Server-Architektur stellt der Server Dienste über das Netzwerk bereit.", correct:true,
      explain:"Richtig. Der Client (z. B. ein Browser) kann diese Dienste anfordern." },
    { text:"Beim Request-Response-Prinzip stellt der Client eine Anfrage und der Server liefert eine Antwort.", correct:true,

      explain:"Richtig. Auf ihm läuft Server-Software, die Anfragen aus dem Internet bearbeitet." },
    { text:"Die Server-Software sendet unaufgefordert HTML-Seiten an alle Browser im Internet.", correct:false,
      explain:"Falsch. Der Server antwortet auf Anfragen; er sendet nicht unaufgefordert an alle Browser." },
    { text:"Auf das WWW kann ausschließlich über einen Web-Browser zugegriffen werden.", correct:false,

  ]
},

  title:"Internetökonomie und digitale Plattformen",
  stem:"Welche der folgenden Aussagen zur Internetökonomie ist/sind korrekt?",
  statements:[
    { text:"Die Internetökonomie umfasst die ökonomische Nutzung des Internets für wertschöpfende Transaktionen.", correct:true,
      explain:"Richtig. Es entsteht ein digitaler Markt bzw. eine digitale Plattform." },
    { text:"Ein Webshop wickelt Bestellungen ab, während eine Vergleichsplattform einen Überblick über Anbieter gibt.", correct:true,
      explain:"Richtig. Beide sind Beispiele für Dienstleistungen im WWW." },
    { text:"Auf einem digitalen Marktplatz (z. B. willhaben) können verschiedene Anbieter inklusive Privatpersonen auftreten.", correct:true,
      explain:"Richtig. Der Marktplatz öffnet die Plattform für viele Anbieter; ein Webshop wird meist von einem Anbieter betrieben." },
    { text:"Ein Plattformbetreiber ist für die Endkund:innen immer offensichtlich erkennbar.", correct:false,
      explain:"Falsch. Oft ist es für Endkund:innen gar nicht offensichtlich, dass sie über einen Plattformbetreiber mit Händlern in Kontakt treten." },
    { text:"Hyperlinks (URLs) verknüpfen Webseiten und machen das Web zu einem Netzwerk aus Ressourcen.", correct:true,
      explain:"Richtig. Diese Verknüpfungen machen das Web zu dem, was es ist." }
